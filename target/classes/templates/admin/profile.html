<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>管理员个人中心</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">管理员信息</div>
        <div class="layui-card-body" style="padding: 15px;">
            <form class="layui-form" lay-filter="adminProfileForm" style="max-width: 600px; margin: 0 auto;">
                <!-- 直接从后端模型 adminUser 获取 uid 并设为隐藏字段 -->
                <input type="hidden" name="uid" th:value="${adminUser?.uid}">
                
                <div class="layui-form-item">
                    <label class="layui-form-label">管理员账号</label>
                    <div class="layui-input-block">
                        <input type="text" name="name" required lay-verify="required" placeholder="请输入管理员账号" autocomplete="off" class="layui-input" th:value="${adminUser?.name}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">新密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" placeholder="留空则不修改密码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label">确认新密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="confirmPassword" placeholder="请再次输入新密码" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">手机号码</label>
                    <div class="layui-input-block">
                        <input type="text" name="telephone" lay-verify="phone" placeholder="请输入手机号码" autocomplete="off" class="layui-input" th:value="${adminUser?.telephone}">
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label">注册时间</label>
                    <div class="layui-input-block">
                        <input type="text" name="createTime" readonly class="layui-input layui-disabled" th:value="${adminUser?.createTime != null ? #dates.format(adminUser.createTime, 'yyyy-MM-dd HH:mm:ss') : ''}" style="border:none; background:none;">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">用户角色</label>
                    <div class="layui-input-block">
                        <input type="text" name="roleName" readonly class="layui-input layui-disabled" th:value="${userRole == 'admin' ? '仓库端' : (userRole == 'user' ? '采购端' : '未知角色')}" style="border:none; background:none;">
                        <!-- 如果需要提交roleId，可以设为隐藏字段，但不应允许修改 -->
                        <input type="hidden" name="roleId" th:value="${adminUser?.roleId}">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveAdminProfile">确认修改</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:inline="javascript">
/*<![CDATA[*/
layui.use(['form', 'layer', 'jquery', 'util'], function(){
    var form = layui.form,
        layer = layui.layer,
        $ = layui.jquery,
        util = layui.util;

    // 后端已经在Controller中将adminUser对象放到了Model中
    // Thymeleaf会直接将值渲染到input的th:value中
    // 如果需要用JS动态填充（例如，如果页面不通过Controller直接加载，而是纯前端模板），则采用下面的AJAX方式
    // 但在这个场景下，后端跳转时已准备好数据，JS部分主要是处理表单提交逻辑

    // 初始化表单数据 (如果th:value已填充，此步骤主要用于JS后续操作或确保动态内容正确)
    var adminUserData = /*[[${adminUser}]]*/ null;
    if (adminUserData) {
        if(adminUserData.createTime){
            // JS中再次格式化或直接使用Thymeleaf格式化的值
            adminUserData.createTime = util.toDateString(new Date(adminUserData.createTime), 'yyyy-MM-dd HH:mm:ss');
        }
        // roleId 应该已经是 adminUser 的一部分
        form.val('adminProfileForm', adminUserData);
    }

    // 表单提交事件
    form.on('submit(saveAdminProfile)', function(data){
        var field = data.field; // 获取表单字段值

        // 密码校验
        if (field.password && field.password !== field.confirmPassword) {
            layer.msg('两次输入的新密码不一致！', {icon: 5});
            return false;
        }
        
        // 如果密码为空，则不提交密码字段，以告知后端不修改密码
        if (!field.password || field.password.trim() === '') {
            delete field.password;
            delete field.confirmPassword;
        } else {
            // 如果提供了新密码，确保confirmPassword不被发送到后端，后端只需要password字段
            delete field.confirmPassword; 
        }
        
        // 发起AJAX请求更新用户信息
        $.ajax({
            url: /*[[@{/user/profile/update}]]*/ '/user/profile/update', // 复用更新接口
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(field),
            dataType: 'json',
            success: function(res){
                if(res.code === 0){
                    layer.msg(res.msg || '管理员信息更新成功！', {icon: 1, time: 1500}, function(){
                        // 更新成功后可以考虑刷新或者重新从后端获取数据填充表单
                        // window.location.reload(); 
                         $.ajax({
                            url: /*[[@{/user/profile/info}]]*/ '/user/profile/info',
                            type: 'GET',
                            success: function(newRes){
                                if(newRes.code === 0 && newRes.user){
                                    var updatedUserData = newRes.user;
                                    if(updatedUserData.createTime){
                                        updatedUserData.createTime = util.toDateString(new Date(updatedUserData.createTime), 'yyyy-MM-dd HH:mm:ss');
                                    }
                                    form.val('adminProfileForm', updatedUserData);
                                    // 如果session中的name或telephone也更新了，主页顶部信息可能需要刷新
                                    // 这通常通过关闭当前标签页，让父页面重新加载或者特定JS调用实现
                                }
                            }
                        });
                    });
                } else {
                    layer.alert(res.msg || '更新失败', {icon: 2});
                }
            },
            error: function(){
                layer.alert('请求更新接口失败，请检查网络或联系管理员。', {icon: 2});
            }
        });
        return false; // 阻止表单跳转
    });

});
/*]]>*/
</script>
</body>
</html>
