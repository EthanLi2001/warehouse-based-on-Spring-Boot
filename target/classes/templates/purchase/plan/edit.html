<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>编辑采购计划</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/layuiadmin/style/admin.css" media="all">
</head>
<body>
<div class="layui-form" lay-filter="layuiadmin-app-form-list" id="layuiadmin-app-form-list" style="padding: 20px 30px 0 0;">
    <input type="hidden" name="planId" th:value="${plan.planId}">
    
    <div class="layui-form-item">
        <label class="layui-form-label">计划编号</label>
        <div class="layui-input-inline">
            <input type="text" name="planNo" th:value="${plan.planNo}" disabled class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">计划名称</label>
        <div class="layui-input-inline">
            <input type="text" name="planName" th:value="${plan.planName}" lay-verify="required" placeholder="请输入计划名称" class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">采购商品</label>
        <div class="layui-input-inline">
            <select name="productId" id="productId" lay-verify="required" class="layui-select">
                <option value="">请选择商品</option>
                <option th:each="product : ${products}" th:value="${product.pid}" th:text="${product.pname}" th:selected="${product.pid == plan.productId}"></option>
            </select>
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">采购数量</label>
        <div class="layui-input-inline">
            <input type="number" name="quantity" th:value="${plan.quantity}" lay-verify="required" placeholder="请输入采购数量" class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">供应商</label>
        <div class="layui-input-inline">
            <select name="supplierName" id="supplierName" class="layui-select">
                <option value="">请选择供应商</option>
                <option th:each="supplier : ${suppliers}" th:value="${supplier.supplierName}" th:text="${supplier.supplierName}" th:selected="${supplier.supplierName == plan.supplierName}"></option>
            </select>
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">采购原因</label>
        <div class="layui-input-block">
            <textarea name="reason" lay-verify="required" placeholder="请输入采购原因" class="layui-textarea" th:text="${plan.reason}"></textarea>
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">状态</label>
        <div class="layui-input-inline">
            <select name="status" id="status" class="layui-select">
                <option value="0" th:selected="${plan.status == 0}">待审核</option>
                <option value="1" th:selected="${plan.status == 1}">已审核</option>
                <option value="2" th:selected="${plan.status == 2}">已执行</option>
                <option value="3" th:selected="${plan.status == 3}">已取消</option>
            </select>
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">备注</label>
        <div class="layui-input-block">
            <textarea name="remark" placeholder="请输入备注信息" class="layui-textarea" th:text="${plan.remark}"></textarea>
        </div>
    </div>
    
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" id="saveBtn">保存修改</button>
            <button class="layui-btn layui-btn-primary" id="cancelBtn">取消</button>
        </div>
    </div>
</div>

<script th:inline="none" src="/jquery-3.5.1.min.js"></script>
<script th:inline="none" src="/layuiadmin/layui/layui.js"></script>
<script th:inline="none">
    $(document).ready(function(){
        layui.use(['form'], function(){
            var form = layui.form;
            form.render('select');
        });
        
        $('#saveBtn').click(function(){
            var planId = $('input[name="planId"]').val();
            var planName = $('input[name="planName"]').val();
            var productId = $('select[name="productId"]').val();
            var quantity = $('input[name="quantity"]').val();
            var supplierName = $('select[name="supplierName"]').val();
            var reason = $('textarea[name="reason"]').val();
            var status = $('select[name="status"]').val();
            var remark = $('textarea[name="remark"]').val();
            
            if(!planName || !productId || !quantity || !reason){
                alert('请填写必填字段');
                return;
            }
            
            $.post('/purchase/plan/update', {
                planId: planId,
                planName: planName,
                productId: productId,
                quantity: quantity,
                supplierName: supplierName,
                reason: reason,
                status: status,
                remark: remark
            }, function(res){
                if(res.code == '0' || res.code == 0){
                    alert('修改成功');
                    var index = parent.layer.getFrameIndex(window.name);
                    parent.layer.close(index);
                    if(window.parent && typeof window.parent.refreshTable === 'function'){
                        window.parent.refreshTable();
                    }
                } else {
                    alert(res.msg || '修改失败');
                }
            });
        });
        
        $('#cancelBtn').click(function(){
            parent.layer.close(parent.layer.getFrameIndex(window.name));
        });
    });
</script>
</body>
</html>
