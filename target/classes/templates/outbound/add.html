<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>新增出库单</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">新增出库单</div>
    <div class="layui-card-body">
      <form class="layui-form" id="add-form">
        <div class="layui-form-item">
          <label class="layui-form-label">出库类型</label>
          <div class="layui-input-inline">
            <select name="type" lay-verify="required">
              <option value="">请选择</option>
              <option value="1" selected>销售出库</option>
            </select>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">关联销售订单</label>
          <div class="layui-input-inline">
            <select name="orderId" id="orderId" lay-verify="required" lay-filter="orderId">
              <option value="">请选择订单</option>
            </select>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品</label>
          <div class="layui-input-inline">
            <div id="productDisplay" class="layui-form-mid layui-word-aux" style="color: #333;">请先选择订单</div>
            <input type="hidden" name="productId" id="productId" />
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">出库数量</label>
          <div class="layui-input-inline">
            <div id="quantityDisplay" class="layui-form-mid layui-word-aux" style="color: #333;">-</div>
            <input type="hidden" name="quantity" id="quantity" />
          </div>
          <div class="layui-form-mid layui-word-aux" id="stockInfo"></div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">备注</label>
          <div class="layui-input-inline">
            <textarea name="remark" placeholder="请输入备注信息" class="layui-textarea"></textarea>
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formSubmit">提交</button>
            <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">取消</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'form', 'layer'], function(){
    var form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    $.get('/outbound/getPendingOrders', function(data) {
      var select = $('#orderId');
      data.forEach(function(item) {
        select.append('<option value="' + item.oid + '">' + item.orderNo + '</option>');
      });
      form.render('select');
      
      if (data.length > 0) {
        $('#orderId').val(data[0].oid);
        $('#orderId').trigger('change');
      }
    });

    form.on('select(orderId)', function(data) {
      var orderId = data.value;
      
      $('#productDisplay').html('请先选择订单');
      $('#productId').val('');
      $('#quantityDisplay').html('-');
      $('#quantity').val('');
      $('#stockInfo').html('');
      
      if (orderId) {
        $.ajax({
          type: 'GET',
          url: '/outbound/getOrderDetails/' + orderId,
          dataType: 'json',
          success: function(response) {
            console.log('Order details:', response);
            if (response && response.details && response.details.length > 0) {
              var detail = response.details[0];
              $('#productDisplay').html(detail.pname || '未知商品');
              $('#productId').val(detail.pid || '');
              $('#quantityDisplay').html(detail.quantity || '0');
              $('#quantity').val(detail.quantity || '');
              
              if (detail.pid) {
                $.get('/outbound/getStock/' + detail.pid, function(stockData) {
                  $('#stockInfo').html('当前库存: ' + (stockData.quantity || 0) + ' 件');
                });
              }
            } else {
              $('#productDisplay').html('该订单没有商品明细');
            }
          },
          error: function(xhr, status, error) {
            console.error('Error:', status, error);
            layer.msg('获取订单详情失败', {time: 1500});
          }
        });
      }
    });

    form.on('submit(formSubmit)', function(data){
      if (!$('#productId').val()) {
        layer.msg('请先选择订单', {time: 1500});
        return false;
      }
      
      $.ajax({
        type: 'post',
        url: '/outbound/add',
        contentType: 'application/json',
        data: JSON.stringify(data.field),
        success: function(res){
          if(res.code == '0'){
            layer.msg('创建成功', {time: 1000}, function(){
              var index = parent.layer.getFrameIndex(window.name);
              parent.layer.close(index);
              parent.layui.table.reload('LAY-app-content-list');
            });
          } else {
            layer.msg(res.msg || '创建失败', {time: 1500});
          }
        },
        error: function(){
          layer.msg('系统异常', {time: 1500});
        }
      });
      return false;
    });

    form.render();
  });

  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
