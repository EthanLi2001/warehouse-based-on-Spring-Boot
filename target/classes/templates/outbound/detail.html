<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>出库单详情</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">出库单详情</div>
    <div class="layui-card-body">
      <div class="layui-form">
        <div class="layui-form-item">
          <label class="layui-form-label">出库单号</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.orderNo}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">出库类型</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.type == 1 ? '销售出库' : '退货出库'}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">关联订单</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.orderId != null ? '订单#' + outbound.orderId : '无'}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${productName}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">出库数量</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.quantity}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">操作人</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${operatorName}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">状态</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.status == 0 ? '待审核' : '已出库'}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">创建时间</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${outbound.createTime}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">备注</label>
          <div class="layui-input-inline">
            <textarea readonly class="layui-textarea layui-disabled" th:text="${outbound.remark}"></textarea>
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">关闭</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
