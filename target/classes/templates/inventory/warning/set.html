<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>设置库存预警</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">设置库存预警</div>
    <div class="layui-card-body">
      <form class="layui-form" id="set-form">
        <input type="hidden" name="productId" th:value="${product.pid}"/>
        
        <div class="layui-form-item">
          <label class="layui-form-label">商品名称</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${product.pname}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">当前库存</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${currentStock}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">库存下限</label>
          <div class="layui-input-inline">
            <input type="number" name="minStock" th:value="${minStock}" lay-verify="required|number" placeholder="请输入库存下限" class="layui-input"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">库存上限</label>
          <div class="layui-input-inline">
            <input type="number" name="maxStock" th:value="${maxStock}" lay-verify="required|number" placeholder="请输入库存上限" class="layui-input"/>
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formSubmit">保存设置</button>
            <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">取消</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'form', 'layer'], function(){
    var form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    form.on('submit(formSubmit)', function(data){
      $.ajax({
        type: 'post',
        url: '/inventory/warning/save',
        contentType: 'application/json',
        data: JSON.stringify(data.field),
        success: function(res){
          if(res.code == 0){
            layer.msg('设置成功', {time: 1000}, function(){
              var index = parent.layer.getFrameIndex(window.name);
              parent.layer.close(index);
              parent.location.reload();
            });
          } else {
            layer.msg(res.msg || '设置失败', {time: 1500});
          }
        },
        error: function(){
          layer.msg('系统异常', {time: 1500});
        }
      });
      return false;
    });

    form.render();
  });

  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
