<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>盘点结果</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">盘点结果报告</div>
    <div class="layui-card-body">
      <div class="layui-row layui-col-space15">
        <div class="layui-col-md3">
          <div class="layui-card layui-bg-blue">
            <div class="layui-card-body">
              <p class="layui-card-header">系统库存总额</p>
              <p class="layui-card-text" style="font-size: 24px; color: #fff;">[[${totalExpected}]]</p>
            </div>
          </div>
        </div>
        <div class="layui-col-md3">
          <div class="layui-card layui-bg-green">
            <div class="layui-card-body">
              <p class="layui-card-header">实际盘点总额</p>
              <p class="layui-card-text" style="font-size: 24px; color: #fff;">[[${totalActual}]]</p>
            </div>
          </div>
        </div>
        <div class="layui-col-md3">
          <div class="layui-card" th:class="${totalDiff >= 0 ? 'layui-bg-orange' : 'layui-bg-red'}">
            <div class="layui-card-body">
              <p class="layui-card-header">总差异</p>
              <p class="layui-card-text" style="font-size: 24px; color: #fff;">[[${totalDiff}]]</p>
            </div>
          </div>
        </div>
        <div class="layui-col-md3">
          <div class="layui-card layui-bg-cyan">
            <div class="layui-card-body">
              <p class="layui-card-header">盘点商品数</p>
              <p class="layui-card-text" style="font-size: 24px; color: #fff;">[[${records.size()}]]</p>
            </div>
          </div>
        </div>
      </div>

      <table class="layui-table">
        <thead>
          <tr>
            <th>商品名称</th>
            <th>系统库存</th>
            <th>实际盘点</th>
            <th>差异</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item:${records}">
            <td th:text="${item.productName}"></td>
            <td th:text="${item.record.expectedQty}"></td>
            <td th:text="${item.record.actualQty}"></td>
            <td>
              <span th:class="${item.record.diffQty > 0 ? 'layui-badge layui-bg-orange' : (item.record.diffQty < 0 ? 'layui-badge layui-bg-red' : 'layui-badge')}" 
                    th:text="${item.record.diffQty}"></span>
            </td>
            <td>
              <span th:text="${item.statusText}" 
                    th:class="${item.record.diffQty > 0 ? 'layui-text-orange' : (item.record.diffQty < 0 ? 'layui-text-red' : '')}"></span>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="layui-form-item">
        <div class="layui-input-block">
          <button class="layui-btn layui-btn-danger" id="adjustBtn" th:if="${check.status == 1}">调整库存</button>
          <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">关闭</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  var checkId = [[${check.checkId}]];
  
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'layer'], function(){
    var layer = layui.layer
            ,$ = layui.jquery;

    $('#adjustBtn').on('click', function() {
      layer.confirm('确认调整库存吗？此操作将根据盘点差异更新系统库存。', {
        btn : [ '确定', '取消' ]
      }, function(index) {
        $.ajax({
          type: 'post',
          url: '/inventory/check/adjustInventory/' + checkId,
          success: function(res) {
            if (res.code == '0') {
              layer.msg('库存调整成功', {time: 1000}, function(){
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                parent.layui.table.reload('LAY-app-content-list');
              });
            } else {
              layer.msg(res.msg || '库存调整失败', {time: 1500});
            }
          },
          error: function() {
            layer.msg('系统异常', {time: 1500});
          }
        });
      });
    });
  });

  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
