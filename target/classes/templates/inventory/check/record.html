<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>录入盘点数量</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">录入盘点数量</div>
    <div class="layui-card-body">
      <div class="layui-form">
        <table class="layui-table">
          <thead>
            <tr>
              <th>商品名称</th>
              <th>系统库存</th>
              <th>实际盘点</th>
              <th>差异</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="item:${records}">
              <td th:text="${item.productName}"></td>
              <td th:text="${item.record.expectedQty}"></td>
              <td>
                <input type="number" th:data-recordid="${item.record.recordId}" 
                       th:value="${item.record.actualQty}" 
                       class="layui-input actualQty" style="width:100px;"/>
              </td>
              <td><span th:text="${item.record.diffQty}" class="diff-text"></span></td>
            </tr>
          </tbody>
        </table>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn" id="saveBtn">保存盘点</button>
            <button class="layui-btn layui-btn-warm" id="completeBtn">完成盘点</button>
            <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  var checkId = [[${check.checkId}]];
  
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'layer'], function(){
    var layer = layui.layer
            ,$ = layui.jquery;

    $('.actualQty').on('change', function() {
      var recordId = $(this).data('recordid');
      var actualQty = parseInt($(this).val()) || 0;
      var expectedQty = parseInt($(this).parent().prev().text());
      var diff = actualQty - expectedQty;
      $(this).parent().next().find('.diff-text').text(diff);
    });

    $('#saveBtn').on('click', function() {
      var records = [];
      $('.actualQty').each(function() {
        var record = {
          recordId: $(this).data('recordid'),
          actualQty: parseInt($(this).val()) || 0
        };
        records.push(record);
        console.log('要保存的记录:', record);
      });

      if (records.length === 0) {
        layer.msg('没有需要保存的数据', {time: 1500});
        return;
      }

      var saveCount = 0;
      records.forEach(function(record) {
        $.ajax({
          type: 'POST',
          url: '/inventory/check/updateRecord',
          contentType: 'application/json; charset=UTF-8',
          data: JSON.stringify(record),
          success: function(res) {
            console.log('保存结果:', res);
            saveCount++;
            if (saveCount == records.length) {
              layer.msg('保存成功', {time: 1000});
            }
          },
          error: function(xhr, status, error) {
            console.error('保存失败:', error);
            layer.msg('保存失败', {time: 1500});
          }
        });
      });
    });

    $('#completeBtn').on('click', function() {
      layer.confirm('确认完成盘点吗？完成后将生成盘点结果。', {
        btn : [ '确定', '取消' ]
      }, function(index) {
        var records = [];
        $('.actualQty').each(function() {
          var record = {
            recordId: $(this).data('recordid'),
            actualQty: parseInt($(this).val()) || 0
          };
          records.push(record);
          console.log('要保存的记录:', record);
        });

        if (records.length === 0) {
          layer.msg('没有需要保存的数据', {time: 1500});
          return;
        }

        var savePromises = [];
        records.forEach(function(record) {
          var promise = new Promise(function(resolve, reject) {
            $.ajax({
              type: 'POST',
              url: '/inventory/check/updateRecord',
              contentType: 'application/json; charset=UTF-8',
              data: JSON.stringify(record),
              success: function(res) {
                console.log('保存结果:', res);
                resolve(res);
              },
              error: function(xhr, status, error) {
                console.error('保存失败:', error);
                reject(error);
              }
            });
          });
          savePromises.push(promise);
        });

        Promise.all(savePromises).then(function(results) {
          console.log('所有记录保存完成');
          
          $.ajax({
            type: 'POST',
            url: '/inventory/check/complete/' + checkId,
            success: function(res) {
              console.log('完成盘点结果:', res);
              if (res.code == '0') {
                layer.msg('盘点完成', {time: 1000}, function(){
                  var index = parent.layer.getFrameIndex(window.name);
                  parent.layer.close(index);
                  parent.layui.table.reload('LAY-app-content-list');
                });
              } else {
                layer.msg(res.msg || '盘点失败', {time: 1500});
              }
            },
            error: function(xhr, status, error) {
              console.error('完成盘点失败:', error);
              layer.msg('完成盘点失败', {time: 1500});
            }
          });
        }).catch(function(error) {
          console.error('保存过程中发生错误:', error);
          layer.msg('保存失败', {time: 1500});
        });
      });
    });
  });

  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
