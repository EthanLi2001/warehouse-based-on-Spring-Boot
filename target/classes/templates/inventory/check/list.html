<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>库存盘点管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">盘点单号：</label>
          <div class="layui-input-inline">
            <input type="text" id="search_checkNo" placeholder="请输入盘点单号" autocomplete="off" class="layui-input"/>
          </div>
        </div>
        <div class="layui-inline">
          <button id="search-submit" class="layui-btn layuiadmin-btn-list" lay-filter="LAY-app-contlist-search">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
          </button>
        </div>
      </div>
    </div>

    <div class="layui-card-body layui-form">
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide">
      </table>

      <script type="text/html" id="toolbarDemo">
        <div class="layui-btn-container">
          <button class="layui-btn layuiadmin-btn-list" lay-event="add">创建盘点任务</button>
        </div>
      </script>

      <script type="text/html" id="table-content-list">
        <a class="layui-btn layui-btn-xs" lay-event="detail"><i class="layui-icon layui-icon-search"></i>详情</a>
        {{# if(d.status == 0){ }}
        <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="record"><i class="layui-icon layui-icon-edit"></i>录入盘点</a>
        {{# } }}
        {{# if(d.status == 1){ }}
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="result"><i class="layui-icon layui-icon-file"></i>盘点结果</a>
        {{# } }}
        {{# if(d.status == 2){ }}
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="result"><i class="layui-icon layui-icon-file"></i>盘点结果</a>
        {{# } }}
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
      </script>

      <script type="text/html" id="statusTpl">
        {{# if(d.status == 0){ }}
        <span class="layui-badge layui-bg-yellow">进行中</span>
        {{# } else if(d.status == 1){ }}
        <span class="layui-badge layui-bg-green">已完成</span>
        {{# } else if(d.status == 2){ }}
        <span class="layui-badge layui-bg-blue">已调整</span>
        {{# } }}
      </script>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'table', 'form'], function(){
    var table = layui.table
            ,form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    layer.ready(function (){
      tableRender(table, {});
    });

    table.on('toolbar(LAY-app-content-list)', function(obj){
      if(obj.event == 'add') {
        layer.open({
          type: 2
          ,title: '创建盘点任务'
          ,area: ['500px','350px']
          ,shade: 0.8
          ,id: 'LAY_layuipro'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inventory/check/toAdd'
        });
      }
    });

    table.on('tool(LAY-app-content-list)', function(obj){
      if(obj.event == 'detail') {
        layer.open({
          type: 2
          ,title: '盘点任务详情'
          ,area: ['600px','450px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_detail'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inventory/check/toRecord/' + obj.data.checkId
        });
      } else if(obj.event == 'record') {
        layer.open({
          type: 2
          ,title: '录入盘点数量'
          ,area: ['800px','600px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_record'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inventory/check/toRecord/' + obj.data.checkId
        });
      } else if(obj.event == 'result') {
        layer.open({
          type: 2
          ,title: '盘点结果'
          ,area: ['800px','600px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_result'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inventory/check/toResult/' + obj.data.checkId
        });
      } else if(obj.event == 'del') {
        layer.confirm('确认要删除吗？', {
          btn : [ '确定', '取消' ]
        }, function(index) {
          $.ajax({
            type: 'post',
            url: '/inventory/check/delete/' + obj.data.checkId,
            success: function(data){
              if(data.code == '0'){
                tableRender(layui.table, {});
                layer.msg('删除成功', {time: 1000});
              }else {
                layer.msg('删除失败', {time: 1000});
              }
            }
          });
        });
      }
    });

    $("#search-submit").on("click", function (){
      var param_search = {
        checkNo: $("#search_checkNo").val()
      };
      tableRender(layui.table, param_search);
      return false;
    });

    form.render();
  });

  function tableRender(table, param_search) {
    table.render({
      elem: '#LAY-app-content-list'
      ,url: '/inventory/check/list'
      ,where: param_search
      ,page: true
      ,limits: [5,10,20,50]
      ,limit: 10
      ,layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip']
      ,method: 'post'
      ,request: {pageName: 'page', limitName: 'limit'}
      ,toolbar: '#toolbarDemo'
      ,cellMinWidth: 80
      ,title: '盘点任务列表'
      ,cols: [ [
        {type:'checkbox'}
        ,{field:'checkId', title:'ID', width:80}
        ,{field:'checkNo', title:'盘点单号', width:150}
        ,{field:'startTime', title:'开始时间', width:150}
        ,{field:'endTime', title:'结束时间', width:150}
        ,{field:'status', title:'状态', width:100, templet: '#statusTpl'}
        ,{fixed: 'right', title:'操作', toolbar: '#table-content-list', width:280}
      ] ]
    });
  }
</script>
</body>
</html>
