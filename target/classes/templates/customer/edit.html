<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑客户</title>
    <link rel="stylesheet" href="/layuiadmin/layui/css/layui.css" media="all">
</head>
<body>
<form id="customerForm">
    <input type="hidden" name="customerId" th:value="${customer.customerId}">
    
    <div class="layui-form-item">
        <label class="layui-form-label">客户名称 <span style="color:red;">*</span></label>
        <div class="layui-input-block">
            <input type="text" name="customerName" th:value="${customer.customerName}" placeholder="请输入客户名称" class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">联系电话 <span style="color:red;">*</span></label>
        <div class="layui-input-block">
            <input type="text" name="phoneNumber" th:value="${customer.phoneNumber}" placeholder="请输入联系电话" class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">联系人</label>
        <div class="layui-input-block">
            <input type="text" name="contactPerson" th:value="${customer.contactPerson}" placeholder="请输入联系人" class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">地址</label>
        <div class="layui-input-block">
            <textarea name="detailedAddress" placeholder="请输入地址" class="layui-textarea" th:text="${customer.detailedAddress}"></textarea>
        </div>
    </div>
    
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button type="button" class="layui-btn" id="saveBtn">保存修改</button>
            <button type="button" class="layui-btn layui-btn-primary" id="cancelBtn">取消</button>
        </div>
    </div>
</form>

<script src="/jquery-3.5.1.min.js"></script>
<script src="/layuiadmin/layui/layui.js"></script>
<script>
$(document).ready(function() {
    $('#saveBtn').click(function() {
        var formData = {};
        $('#customerForm input, #customerForm textarea').each(function() {
            formData[$(this).attr('name')] = $(this).val();
        });
        
        $.ajax({
            type: 'POST',
            url: '/customer/update',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function(res) {
                if (res.code === '0') {
                    alert('修改成功');
                    var index = parent.layer.getFrameIndex(window.name);
                    parent.layer.close(index);
                    parent.location.reload();
                } else {
                    alert(res.msg || '修改失败');
                }
            },
            error: function() {
                alert('网络异常');
            }
        });
    });
    
    $('#cancelBtn').click(function() {
        var index = parent.layer.getFrameIndex(window.name);
        parent.layer.close(index);
    });
});
</script>
</body>
</html>
