<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>订单列表查询</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css"
          media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css"
          media="all">
    <style>
        .layui-table-cell .layui-form-checkbox[lay-skin="primary"] {
            top: 50%;
            transform: translateY(-50%);
        }

        /*.layui-table-cell.laytable-cell-1-0-9 {*/
        /*    width: 300px;*/
        /*}*/

    </style>
</head>

<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div id="xxx" class="layui-form layui-card-header layuiadmin-card-header-auto">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">订单ID：</label>
                    <div class="layui-input-inline">
                        <input type="text" id="search_oid" placeholder="请输入订单ID" autocomplete="off"
                               class="layui-input"/>
                    </div>
                </div>
                <div class="layui-inline">
                    <button id="search-submit" class="layui-btn layuiadmin-btn-list"
                            lay-filter="LAY-app-contlist-search">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </button>
                </div>
            </div>
        </div>

        <div class="layui-card-body layui-form">
            <!-- 异步方式生成表格体 -->
            <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide">
            </table>

            <!-- 工具栏 -->
            <script type="text/html" id="toolbarDemo">
                <div class="layui-btn-container">
                    <button class="layui-btn layuiadmin-btn-list layui-btn-danger" lay-event="batchdel">批量删除
                    </button>
                    <button class="layui-btn layuiadmin-btn-list" lay-event="add">添加</button>
                </div>
            </script>

            <!-- 表格右侧的操作列 -->
            <script type="text/html" id="table-content-list">
                <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit"><i
                        class="layui-icon layui-icon-edit"></i>编辑</a>
                <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i
                        class="layui-icon layui-icon-delete"></i>删除</a>
                {{#  if(d.status == 0){ }}
                <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="pay"><i
                        class="layui-icon layui-icon-dollar"></i>确认付款</a>
                {{#  } }}
                {{#  if(d.status == 1){ }}
                <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="pack"><i
                        class="layui-icon layui-icon-cart"></i>确认打包</a>
                {{#  } }}
                {{#  if(d.status == 2){ }}
                <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="delivery"><i
                        class="layui-icon layui-icon-truck"></i>创建发货单</a>
                {{#  } }}
            </script>
        </div>
    </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
    layui.config({
        base: '/layuiadmin/' // 静态资源所在路径
    }).extend({
        index: 'lib/index' // 主入口模块
    }).use(['index', 'table'], function () {
        var table = layui.table,
            form = layui.form,
            layer = layui.layer,
            laypage = layui.laypage,
            $ = layui.jquery;

        layer.ready(function () {
            tableRender(table, {oid: ''});
        });

        // 监听行外左侧工具条按钮
        table.on('toolbar(LAY-app-content-list)', function (obj) {
            if (obj.event == 'batchdel') {
                var checkStatus = table.checkStatus('LAY-app-content-list'), data = checkStatus.data;
                var delList = [];
                data.forEach(function (n, i) {
                    delList.push(n.oid);
                });
                console.log(delList);
                layer.confirm('确认要删除被选中的记录吗？', {
                    btn: ['确定', '取消'] // 按钮
                }, function (index) {
                    $.ajax({
                        type: 'post',
                        url: '/orders/batchDel',
                        data: {oid: delList},
                        success: function (data) {
                            if (data.code == '0') {
                                var param_search = {oid: $("#search_oid").val()};
                                tableRender(layui.table, param_search);
                                layer.msg('批量删除成功', {time: 1000});
                            } else {
                                layer.msg('批量删除失败', {time: 1000});
                            }
                        }
                    });
                });
            } else if (obj.event == 'add') {
                layer.open({
                    type: 2,
                    title: '添加订单',
                    area: ['450px', '500px'],
                    shade: 0.8,
                    id: 'LAY_layuipro',
                    btn: [],
                    btnAlign: 'c',
                    moveType: 1,
                    content: '/orders/toAdd',
                    success: function (layero) {
                        console.log('完成新增');
                    }
                });
            }
        });

        // 监听行内操作列按钮
        table.on('tool(LAY-app-content-list)', function (obj) {
            if (obj.event == 'edit') {
                layer.open({
                    type: 2,
                    title: '修改订单',
                    area: ['450px', '500px'],
                    shade: 0.8,
                    id: 'LAY_layuipro',
                    btn: [],
                    btnAlign: 'c',
                    moveType: 1,
                    content: '/orders/toEdit/' + obj.data.oid,
                    success: function (layero) {
                        console.log('完成修改');
                    }
                });
            } else if (obj.event == 'del') {
                layer.confirm('确认要删除吗？', {
                    btn: ['确定', '取消']
                }, function (index) {
                    $.ajax({
                        type: 'post',
                        url: '/orders/doDel/' + obj.data.oid,
                        data: {},
                        success: function (data) {
                            if (data.code == '0') {
                                var param_search = {oid: $("#search_oid").val()};
                                tableRender(layui.table, param_search);
                                layer.msg('删除成功', {time: 1000});
                            } else {
                                layer.msg('删除失败', {time: 1000});
                            }
                        }
                    });
                });
            } else if (obj.event == 'pay') {
                layer.confirm('确认订单已付款？', {btn: ['确定', '取消']}, function (index) {
                    updateOrderStatus(obj.data.oid, 1, '付款成功');
                });
            } else if (obj.event == 'pack') {
                layer.confirm('确认订单已打包？', {btn: ['确定', '取消']}, function (index) {
                    updateOrderStatus(obj.data.oid, 2, '打包成功，已自动创建发货单');
                });
            } else if (obj.event == 'delivery') {
                layer.open({
                    type: 2,
                    title: '创建发货单',
                    area: ['600px', '500px'],
                    shade: 0.8,
                    id: 'LAY_layuipro',
                    btn: [],
                    btnAlign: 'c',
                    moveType: 1,
                    content: '/delivery/toAdd?orderId=' + obj.data.oid,
                    success: function (layero) {
                        console.log('打开发货单页面');
                    }
                });
            }
        });
        
        function updateOrderStatus(orderId, status, successMsg) {
            $.ajax({
                type: 'post',
                url: '/orders/updateStatus',
                data: {oid: orderId, status: status},
                success: function (data) {
                    if (data.code == '0') {
                        var param_search = {oid: $("#search_oid").val()};
                        tableRender(layui.table, param_search);
                        layer.msg(successMsg, {time: 1500});
                    } else {
                        layer.msg(data.msg || '操作失败', {time: 1500});
                    }
                }
            });
        }


        $("#search-submit").on("click", function () {
            var param_search = {oid: $("#search_oid").val()};
            tableRender(layui.table, param_search);
            return false;
        });
    });

    function tableRender(table, param_search) {
        table.render({
            elem: '#LAY-app-content-list',
            url: '/orders/getPage',
            where: param_search,
            page: true,
            limits: [2, 5, 10, 20, 50],
            limit: 5,
            layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip'],
            method: 'post',
            request: {pageName: 'page', limitName: 'limit'},
            toolbar: '#toolbarDemo',
            cellMinWidth: 80,
            defaultToolbar: ['filter', 'exports', 'print'],
            title: '订单信息表',
            cols: [
                [
                    {type: 'checkbox'},
                    {field: 'orderNo', title: '订单号', width: 180},
                    {field: 'deliveryNo', title: '发货单号', width: 150},
                    {field: 'outboundNo', title: '出库单号', width: 150},
                    {field: 'oid', title: '订单ID', width: 100},
                    {field: 'userName', title: '用户名称', width: 180},
                    {field: 'productNames', title: '商品名称', width: 250},
                    {field: 'status', title: '订单状态', width: 120,
                        templet: function(d) {
                            switch(d.status) {
                                case 0: return '待付款';
                                case 1: return '待制作';
                                case 2: return '待配送';
                                case 3: return '已完成';
                                case 4: return '已取消';
                            }
                        }
                    },
                    {field: 'totalPrice', title: '订单总价', width: 120, templet: '#totalPriceTpl'},
                    {field: 'orderTime', title: '下单时间', width: 180, templet: function(d) {
                        return layui.util.toDateString(d.orderTime, 'yyyy-MM-dd HH:mm:ss');
                    }},
                    {field: 'deliveryTime', title: '配送时间', width: 180, templet: function(d) {
                        return layui.util.toDateString(d.deliveryTime, 'yyyy-MM-dd HH:mm:ss');
                    }},
                    {fixed: 'right', title: '操作', toolbar: '#table-content-list', width: 350}
                ]
            ]
        });
    }
</script>
</body>
</html>
