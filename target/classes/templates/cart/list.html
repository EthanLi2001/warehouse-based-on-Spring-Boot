<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>购物车列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
  <style>
    .layui-table-cell .layui-form-checkbox[lay-skin="primary"] {
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div id="xxx" class="layui-form layui-card-header layuiadmin-card-header-auto">
      <!-- 移除了按购物车ID搜索的表单项 -->
      <!--
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">购物车ID：</label>
          <div class="layui-input-inline">
            <input type="text" id="search_cid" placeholder="请输入购物车ID" autocomplete="off" class="layui-input"/>
          </div>
        </div>
        <div class="layui-inline">
          <button id="search-submit" class="layui-btn layuiadmin-btn-list"
                  lay-filter="LAY-app-contlist-search">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
          </button>
        </div>
      </div>
      -->
    </div>

    <div class="layui-card-body layui-form">
      <!-- 异步方式生成表格体 -->
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide"></table>

      <!-- 工具栏 -->
      <script type="text/html" id="toolbarDemo">
        <div class="layui-btn-container">
          <button class="layui-btn layuiadmin-btn-list layui-btn-danger" lay-event="batchdel">批量删除</button>
          <button class="layui-btn layuiadmin-btn-list" lay-event="add">添加</button>
        </div>
      </script>

      <!-- 表格右侧的操作列 -->
      <script type="text/html" id="table-content-list">
        <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
      </script>
    </div>

    <!-- 总计和结算按钮 -->
    <div class="layui-form layui-card-footer" style="padding: 15px;">
        <div style="float: right;">
            <span>已选商品总价：<strong id="totalSelectedPrice" style="color: red; font-size: 18px;">¥0.00</strong></span>
            <button class="layui-btn layui-btn-danger" id="checkoutButton" style="margin-left: 20px;">去结算</button>
        </div>
        <div style="clear: both;"></div>
    </div>

  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/' // 静态资源所在路径
  }).extend({
    index: 'lib/index' // 主入口模块
  }).use(['index', 'table'], function(){
    var table = layui.table,
            form = layui.form,
            layer = layui.layer,
            laypage = layui.laypage,
            $ = layui.jquery;

    layer.ready(function (){
      // tableRender(table, { cid: '' }); // 旧的调用方式
      tableRender(table, {}); // 新的调用方式，不传递cid
    });

    // 监听行外左侧工具条按钮
    table.on('toolbar(LAY-app-content-list)', function(obj){
      if(obj.event == 'batchdel') {
        var checkStatus = table.checkStatus('LAY-app-content-list'), data = checkStatus.data;
        var delList = [];
        data.forEach(function(n, i){
          delList.push(n.cid);  // 购物车项ID
        });
        console.log(delList);
        layer.confirm('确认要删除被选中的记录吗？', {
          btn : [ '确定', '取消'] // 按钮
        }, function(index) {
          $.ajax({
            type: 'post',
            url: '/cart/batchDel',  // 批量删除接口
            data: { cid: delList },
            success: function(data) {
              if(data.code == '0'){
                // var param_search = { cid: $("#search_cid").val() }; // 旧的参数
                tableRender(layui.table, {}); // 刷新时不传cid
                layer.msg('批量删除成功', { time: 1000 });
              } else {
                layer.msg('批量删除失败', { time: 1000 });
              }
            }
          });
        });
      } else if(obj.event == 'add') {
        layer.open({
          type: 2,
          title: '添加购物车',
          area: ['450px', '500px'],
          shade: 0.8,
          id: 'LAY_layuipro',
          btn: [],
          btnAlign: 'c',
          moveType: 1,
          content: '/cart/toAdd',
          success: function(layero){
            console.log('完成新增');
          }
        });
      }
    });

    // 监听行内操作列按钮
    table.on('tool(LAY-app-content-list)', function(obj){
      if(obj.event == 'edit') {
        layer.open({
          type: 2,
          title: '修改购物车',
          area: ['450px', '500px'],
          shade: 0.8,
          id: 'LAY_layuipro',
          btn: [],
          btnAlign: 'c',
          moveType: 1,
          content: '/cart/toEdit/' + obj.data.cid,  // 购物车项ID
          success: function(layero){
            console.log('完成修改');
          }
        });
      } else if(obj.event == 'del') {
        layer.confirm('确认要删除吗？', {
          btn : [ '确定', '取消' ]
        }, function(index) {
          $.ajax({
            type: 'post',
            url: '/cart/doDel/' + obj.data.cid,  // 删除单个购物车项
            data: {},
            success: function(data) {
              if(data.code == '0'){
                // var param_search = { cid: $("#search_cid").val() }; // 旧的参数
                tableRender(layui.table, {}); // 刷新时不传cid
                layer.msg('删除成功', { time: 1000 });
              } else {
                layer.msg('删除失败', { time: 1000 });
              }
            }
          });
        });
      }
    });

    // $("#search-submit").on("click", function (){
    //   var param_search = { cid: $("#search_cid").val() };
    //   tableRender(layui.table, param_search);
    //   return false;
    // });

    // 为动态生成的数量输入框绑定事件 (使用事件委托)
    $(document).on('change', '.quantity-input', function() {
        var newQuantity = $(this).val();
        var cartId = $(this).data('cid');
        var that = this; // 保存当前input的引用

        if (newQuantity < 1) {
            layer.msg('商品数量不能小于1');
            // 可以考虑恢复旧值，或者让用户自己修正
            // $(this).val($(this).data('old-quantity')); // 如果有保存旧值的话
            return;
        }

        // 发起AJAX请求更新后端
        $.ajax({
            url: '/cart/doEdit',
            type: 'POST',
            data: {
                cid: cartId,
                quantity: newQuantity
                // 注意：后端 CartController 的 doEdit 方法目前接收 Cart对象。
                // 前端这样发送，Spring MVC会尝试将 cid 和 quantity 绑定到 Cart 对象的同名属性上。
                // 其他 Cart 属性（如uid, pid, addedTime）会是null，这在更新时可能需要注意。
                // 一个更安全的做法是后端 doEdit 接收 (Integer cid, Integer quantity) 或一个专门的DTO。
                // 或者前端先根据cid获取完整Cart对象，修改quantity后再提交，但这会增加复杂性。
            },
            success: function(result) {
                if (result.code == '0') {
                    layer.msg('数量已更新', {icon: 1, time: 700}, function(){
                        // 刷新整个表格以更新小计和总计 (如果总计在页面上显示)
                        // 或者更精细地只更新当前行的小计和总计（需要更多DOM操作）
                        $(".layui-laypage-btn").click(); // 模拟点击刷新按钮，或者用 table.reload()
                    });
                } else {
                    layer.msg(result.msg || '更新失败', {icon: 2});
                    // 可以考虑恢复输入框的值到更新前
                }
            },
            error: function() {
                layer.msg('请求失败，请检查网络', {icon: 2});
                // 可以考虑恢复输入框的值到更新前
            }
        });
    });

    // 计算并更新选中商品的总价
    function updateTotalSelectedPrice() {
      var total = 0;
      var checkedItems = layui.table.checkStatus('LAY-app-content-list').data;
      checkedItems.forEach(function(item) {
        if (item.subtotal) { // subtotal 应该由后端计算并提供
          total += parseFloat(item.subtotal);
        }
      });
      $('#totalSelectedPrice').text('¥' + total.toFixed(2));
    }

    // 监听复选框选择事件 (需要等table渲染完成后才能有效监听)
    // 使用 layui.table.on('checkbox(filter)')
    layui.table.on('checkbox(LAY-app-content-list)', function(obj){
        // obj.checked 表示当前是否选中状态（对于头复选框是全选/全不选）
        // obj.type 表示如果操作的是表头复选框， তাহলে type 为 'all'，如果操作的是数据行复选框，type 为 'one'
        console.log('Checkbox event:', obj);
        updateTotalSelectedPrice();
    });

    // "去结算"按钮点击事件
    $("#checkoutButton").on("click", function(){
        var checkedItems = layui.table.checkStatus('LAY-app-content-list').data;
        if (checkedItems.length === 0) {
            layer.msg("请至少选择一件商品进行结算！", {icon: 5});
            return;
        }

        var cartItemIds = [];
        checkedItems.forEach(function(item){
            cartItemIds.push(item.cid);
        });

        layer.confirm('确认将选中的 ' + checkedItems.length + ' 件商品生成订单吗？', {icon: 3, title:'提示'}, function(index){
            layer.close(index);
            // 发起创建订单的AJAX请求
            $.ajax({
                url: '/orders/createFromCart',
                type: 'POST',
                contentType: 'application/json', // 发送JSON数据
                data: JSON.stringify(cartItemIds), // 将ID列表转换为JSON字符串
                dataType: 'json', // 期望服务器返回JSON
                success: function(result){
                    if (result.code == '0' || result.code == 0) {
                        // 修改此处，直接从 result.orderId 获取，因为 AjaxResult.put("orderId", ...) 是直接放在顶层map中的
                        var orderIdToShow = result.orderId ? result.orderId : '未知';
                        layer.alert('订单创建成功！订单号：' + orderIdToShow , {icon: 1}, function(alertIndex){
                            layer.close(alertIndex);
                            // 刷新购物车列表 (因为已下单商品会被删除)
                            // table.reload('LAY-app-content-list'); // 更推荐使用 table.reload
                            $(".layui-laypage-btn").click(); 
                            updateTotalSelectedPrice(); // 更新总价显示（应为0）
                            // TODO: 跳转到订单详情页或支付页面
                            // if (orderIdToShow !== '未知') {
                            //     window.location.href = '/orders/toEdit/' + orderIdToShow; // 跳转到订单编辑/详情页
                            // }
                        });
                    } else {
                        layer.alert('订单创建失败：' + (result.msg || '未知错误'), {icon: 2});
                    }
                },
                error: function(xhr, status, error){
                    layer.alert('创建订单请求失败：' + error, {icon: 2});
                }
            });
        });
    });
  });

  function tableRender(table, param_search) {
    table.render({
      elem: '#LAY-app-content-list',
      url: '/cart/getMyCartItems',  // 获取购物车列表的接口
      // where: param_search, // 修改处：移除了特定用户购物车不需要的cid搜索参数
      page: true,
      limits: [2, 5, 10, 20, 50],
      limit: 5,
      layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip'],
      method: 'post',
      request: {pageName: 'page', limitName: 'limit'},
      toolbar: '#toolbarDemo',
      cellMinWidth: 80,
      defaultToolbar: ['filter', 'exports', 'print',{ // 自定义头部工具栏右侧图标。如无需自定义，去除该参数即可
        title: '提示'
        , layEvent: 'LAYTABLE_TIPS'
        , icon: 'layui-icon-tips'
      }],
      title: '我的购物车', // 修改标题
      cols: [
        [
          {type: 'checkbox', fixed: 'left'},
          {field: 'cid', title: 'ID', width: 80, sort: true, hide: true}, // 通常购物车ID对用户不可见或不重要
          {
            field: 'pfile', title: '商品图片', width: 120, align: 'center', // 调整宽度和对齐
            templet: function(d) {
              if (d.pfile) {
                var imagePath = d.pfile;
                // Ensure /img/ prefix if not present
                if (imagePath && !imagePath.startsWith('/img/')) {
                  imagePath = '/img/' + imagePath;
                }
                // Add styles for image display
                return '<div style="display: flex; align-items: center; justify-content: center; height: 100%; padding:2px;">' + // Outer div for centering & padding
                         '<img src="' + imagePath + '" alt="' + (d.prodName || '商品图片') + '" style="max-height: 60px; max-width: 100%; width: auto; height: auto; display: block;"/>' +
                       '</div>';
              } else {
                return '无图';
              }
            }
          },
          {field: 'prodName', title: '商品名称', minWidth: 150},
          // {field: 'userName', title: '用户名称', minWidth: 100}, // 从用户购物车列表视图中移除，因为总是当前用户
          {
            field: 'price', title: '单价', width: 100, align: 'right',
            templet: function(d){ return '¥' + (d.price != null ? d.price.toFixed(2) : '0.00'); }
          },
          {
            field: 'quantity', title: '数量', width: 120, align: 'center', // 增加宽度以便输入框完整显示
            templet: function(d){
              return '<input type="number" class="layui-input layui-input-sm quantity-input" style="width: 70px; text-align: center;" value="' + d.quantity + '" data-cid="' + d.cid + '" min="1">';
            }
          },
          {
            field: 'subtotal', title: '小计', width: 100, align: 'right',
            templet: function(d){ return '¥' + (d.subtotal != null ? d.subtotal.toFixed(2) : '0.00'); }
          },
          {field: 'addedTime', title: '加入时间', width: 170, sort: true,
            templet: function(d){
              if(d.addedTime){
                return layui.util.toDateString(new Date(d.addedTime), 'yyyy-MM-dd HH:mm:ss');
              }
              return '';
            }
          },
          {title: '操作', minWidth: 150, align: 'center', fixed: 'right', toolbar: '#table-content-list'}
        ]
      ]
    });
  }
</script>
</body>
</html>
