<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>新增商品信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css"
          media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css"
          media="all">
</head>
<body>

<div class="layui-form" lay-filter="layuiadmin-app-form-list" id="layuiadmin-app-form-list"
     style="padding: 20px 30px 0 0;">
    <div class="layui-form-item">
        <label class="layui-form-label">商品名称</label>
        <div class="layui-input-inline">
            <input type="text" name="pname" lay-verify="required" placeholder="请输入商品名称" autocomplete="off"
                   class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">商品单价</label>
        <div class="layui-input-inline">
            <input type="number" name="price" lay-verify="required" placeholder="请输入商品单价" autocomplete="off"
                   class="layui-input">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">库存下限</label>
        <div class="layui-input-inline">
            <input type="number" name="minStock" placeholder="请输入库存下限" 
                   autocomplete="off" class="layui-input" value="0">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">库存上限</label>
        <div class="layui-input-inline">
            <input type="number" name="maxStock" placeholder="请输入库存上限" 
                   autocomplete="off" class="layui-input" value="1000">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">商品描述</label>
        <div class="layui-input-block">
            <textarea name="description" lay-verify="required" placeholder="请输入商品描述" class="layui-textarea"></textarea>
        </div>
    </div>

    <div class="layui-col-md12">
        <div class="layui-card">
            <div class="layui-card-header">选完文件后不自动上传</div>
            <div class="layui-card-body">
                <div class="layui-upload">
                    <button type="button" class="layui-btn layui-btn-normal" id="test-upload-change">选择文件</button>
                    <button type="button" class="layui-btn" id="test-upload-change-action">开始上传</button>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-inline">
            <input type="hidden" id="imageName" name="pfile" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
        <div class="layui-input-inline">
            <button class="layui-btn layuiadmin-btn-list layui-btn-normal" lay-submit
                    lay-filter="layuiadmin-app-form-submit" id="layuiadmin-app-add-submit">添加
            </button>
            <button class="layui-btn layuiadmin-btn-list layui-btn-primary"
                    lay-filter="" id="layuiadmin-app-add-cancel">取消
            </button>
        </div>
    </div>
</div>


</body>
<script src="/static/layuiadmin/layui/layui.js" th:src="@{/layuiadmin/layui/layui.js}"></script>
<script src="/static/js/jquery-3.5.1.min.js" th:src="@{/js/jquery-3.5.1.min.js}"></script>
<script>
    layui.config({
        base: '/layuiadmin/'
    }).extend({
        index: 'lib/index'
    }).use(['index', 'form', 'upload'], function () {
        var $ = layui.jquery
            , layer = parent.layer === undefined ? layui.layer : parent.layer
            , form = layui.form
            , upload = layui.upload;

        upload.render({
            elem: '#test-upload-change'
            ,url: '/product/upload'
            ,auto: false
            ,bindAction: '#test-upload-change-action'
            ,done: function(res){
                if(res.code == 0){
                    $("#imageName").val(res.data);
                     layer.msg('上传成功');
                } else {
                    alert(res.msg || '上传失败，请检查后端日志');
                }
            }
            ,error: function(index, upload){
                layer.alert('上传接口请求失败，请检查网络或联系管理员。');
            }
        });

        form.on('submit(layuiadmin-app-form-submit)', function (data) {
            var field = data.field;
            var index = parent.layer.getFrameIndex(window.name);

            $.ajax({
                type: 'post',
                url: '/product/doAdd',
                data: field,
                dataType: 'json',
                success: function (data) {
                    if (data.code == '0' || data.code == 0) {
                        layer.msg('添加成功', {
                            time: 1000,
                            end: function () {
                                parent.layer.close(index);
                                if (window.parent && window.parent.layui && window.parent.layui.table) {
                                   window.parent.layui.table.reload('LAY-app-content-list');
                                } else if (window.parent && typeof window.parent.refreshTable === 'function') {
                                   window.parent.refreshTable();
                                }
                            }
                        });
                    } else {
                        layer.msg(data.msg || '添加失败', {
                            time: 1000,
                            end: function () {
                            }
                        });
                    }
                },
                error: function(xhr, status, error){
                    layer.alert('添加商品请求失败：' + error);
                }
            });
        });

        $("#layuiadmin-app-add-cancel").on('click', function () {
            parent.layer.close(parent.layer.getFrameIndex(window.name));
        });
        });
</script>
</html>
