<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>商品浏览</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
  <style>
    .layui-table-cell .layui-form-checkbox[lay-skin="primary"] {
      top: 50%;
      transform: translateY(-50%);
    }
    .layui-table-cell{
      height: 90px;
    }
    .warning-low {
      color: #ff5722;
      font-weight: bold;
    }
    .warning-high {
      color: #ff9800;
      font-weight: bold;
    }
    .warning-normal {
      color: #67c23a;
    }
  </style>
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">商品名称：</label>
          <div class="layui-input-inline">
            <input type="text" id="search_prodName" placeholder="请输入商品名称" autocomplete="off"
                   class="layui-input"/>
          </div>
        </div>
        <div class="layui-inline">
          <button id="search-submit" class="layui-btn layuiadmin-btn-list"
                  lay-filter="LAY-app-contlist-search">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
          </button>
          <button id="refresh-btn" class="layui-btn layui-btn-normal layuiadmin-btn-list">
            <i class="layui-icon layui-icon-refresh layuiadmin-button-btn"></i>刷新
          </button>
          <button id="batch-records-btn" class="layui-btn layuiadmin-btn-list">
            <i class="layui-icon layui-icon-list"></i>批次记录
          </button>
        </div>
      </div>
    </div>

    <div class="layui-card-body layui-form">
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide">
      </table>

      <script type="text/html" id="table-content-list">
        <a class="layui-btn layui-btn-xs" lay-event="detail"><i class="layui-icon layui-icon-search"></i>详情</a>
      </script>

      <script type="text/html" id="statusTpl">
        {{# if(d.warning == 'low'){ }}
        <span class="layui-badge layui-bg-red">库存不足</span>
        {{# } else if(d.warning == 'high'){ }}
        <span class="layui-badge layui-bg-orange">库存积压</span>
        {{# } else { }}
        <span class="layui-badge">正常</span>
        {{# } }}
      </script>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'table', 'layer'], function(){
    var table = layui.table
            ,form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    layer.ready(function (){
      tableRender(table, { pname: ''});
    });

    table.on('tool(LAY-app-content-list)', function(obj){
      if(obj.event == 'detail') {
        layer.open({
          type: 2
          ,title: '商品详情'
          ,area: ['550px','450px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_detail'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/product/toDetail/' + obj.data.pid
        });
      }
    });

    $("#search-submit").on("click", function (){
      tableRender(layui.table, { pname: $("#search_prodName").val() });
      return false;
    });

    $("#refresh-btn").on("click", function (){
      $("#search_prodName").val('');
      tableRender(layui.table, { pname: '' });
    });

    $("#batch-records-btn").on("click", function (){
      layer.open({
        type: 2
        ,title: '入库批次记录'
        ,area: ['850px','600px']
        ,shade: 0.8
        ,id: 'LAY_layuipro_batch_user'
        ,btn: []
        ,btnAlign: 'c'
        ,moveType: 1
        ,content: '/inbound/toBatchRecords'
      });
      return false;
    });
  });

  function tableRender(table, param_search) {
    table.render({
      elem: '#LAY-app-content-list'
      ,url: '/product/getPage'
      ,where: param_search
      ,page: true
      ,limits: [5,10,20,50]
      ,limit: 10
      ,layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip']
      ,method: 'post'
      ,request: {pageName: 'page', limitName: 'limit'}
      ,cellMinWidth: 80
      ,defaultToolbar: ['filter', 'exports', 'print']
      ,title: '商品信息表'
      ,cols: [ [
        {field:'pid', title:'商品编号', width:100, sort:true}
        ,{field:'pname', title:'商品名称', width:130}
        ,{field:'price', title:'商品单价', width:100, templet: function(d){
            return '¥' + d.price;
          }}
        ,{field:'quantity', title:'当前库存', width:100, templet: function(d){
            var colorClass = '';
            if (d.warning == 'low') colorClass = 'warning-low';
            else if (d.warning == 'high') colorClass = 'warning-high';
            else colorClass = 'warning-normal';
            return '<span class="' + colorClass + '">' + (d.quantity || 0) + '</span>';
          }}
        ,{field:'minStock', title:'库存下限', width:100}
        ,{field:'maxStock', title:'库存上限', width:100}
        ,{field:'warning', title:'预警状态', width:120, templet: '#statusTpl'}
        ,{
          title:'商品图片',
          width:120,
          templet:function (d) {
              if (d.pfile) {
                  let imageUrl = d.pfile;
                  if (!imageUrl.startsWith("/img/") && !imageUrl.startsWith("http")) {
                      imageUrl = "/img/" + imageUrl;
                  }
                  return '<img src="'+imageUrl+'" style="max-width: 100%; height: auto; max-height: 60px; display: block; margin: auto; cursor: pointer;" onclick="viewProductImage(\'' + imageUrl + '\')"/>';
              }
              return '';
          }
         }
        ,{field:'description', title:'商品描述', width:200}
        ,{fixed: 'right', title:'操作', toolbar: '#table-content-list', width:100}
      ] ]
    });
  }

  function viewProductImage(imageUrl) {
    layer.photos({
      photos: {
        "title": "商品图片",
        "id": 123,
        "start": 0,
        "data": [
          {
            "alt": "商品大图",
            "pid": 666,
            "src": imageUrl,
            "thumb": ""
          }
        ]
      }
      ,anim: 5
    });
  }
</script>
</body>
</html>
