<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>供应商管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/layuiadmin/style/admin.css" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <div class="layui-form">
                        <div class="layui-form-item">
                            <label class="layui-form-label">供应商名称</label>
                            <div class="layui-input-inline">
                                <input type="text" id="search_supplierName" placeholder="请输入供应商名称" autocomplete="off" class="layui-input">
                            </div>
                            <button class="layui-btn" id="search-submit">
                                <i class="layui-icon layui-icon-search"></i>查询
                            </button>
                            <button class="layui-btn layui-btn-primary" id="refresh-btn">
                                <i class="layui-icon layui-icon-refresh"></i>刷新
                            </button>
                        </div>
                    </div>
                </div>
                <div class="layui-card-body">
                    <table class="layui-hide" id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table>
                    
                    <script type="text/html" id="toolbarDemo">
                        <div class="layui-btn-container">
                            <button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchDel">
                                <i class="layui-icon layui-icon-delete"></i>批量删除
                            </button>
                            <button class="layui-btn layui-btn-sm" lay-event="add">
                                <i class="layui-icon layui-icon-add-1"></i>添加供应商
                            </button>
                        </div>
                    </script>
                    
                    <script type="text/html" id="table-content-list">
                        <a class="layui-btn layui-btn-xs" lay-event="detail"><i class="layui-icon layui-icon-search"></i>详情</a>
                        <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>
                        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script th:src="@{/js/jquery-3.5.1.min.js}" src="/static/js/jquery-3.5.1.min.js"></script>
<script>
    layui.config({
        base: '/layuiadmin/'
    }).extend({
        index: 'lib/index'
    }).use(['index', 'table', 'layer'], function(){
        var table = layui.table
            ,form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

        layer.ready(function (){
            tableRender(table, { supplierName: ''});
        });

        table.on('toolbar(LAY-app-content-list)', function(obj){
            if(obj.event == 'add') {
                layer.open({
                    type: 2
                    ,title: '添加供应商'
                    ,area: ['500px','450px']
                    ,shade: 0.8
                    ,id: 'LAY_layuipro'
                    ,btn: []
                    ,btnAlign: 'c'
                    ,moveType: 1
                    ,content: '/supplier/toAdd'
                });
            } else if(obj.event == 'batchDel') {
                var checkStatus = table.checkStatus('LAY-app-content-list');
                var data = checkStatus.data;
                if (data.length === 0) {
                    layer.msg('请选择要删除的记录');
                    return;
                }
                
                layer.confirm('确认要删除选中的 ' + data.length + ' 条记录吗？', {
                    btn : [ '确定', '取消' ]
                }, function(index) {
                    var ids = [];
                    for (var i = 0; i < data.length; i++) {
                        ids.push(data[i].supplierId);
                    }
                    
                    layer.close(index);
                    
                    $.ajax({
                        type: 'post',
                        url: '/supplier/batchDelete',
                        contentType: 'application/json',
                        data: JSON.stringify(ids),
                        success: function(res){
                            if (res.code == '0') {
                                tableRender(table, { supplierName: $("#search_supplierName").val() });
                                layer.msg('批量删除成功', { time: 1000 });
                            } else {
                                layer.msg('批量删除失败', { time: 1000 });
                            }
                        }
                    });
                });
            }
        });

        table.on('tool(LAY-app-content-list)', function(obj){
            if(obj.event == 'detail') {
                layer.open({
                    type: 2
                    ,title: '供应商详情'
                    ,area: ['500px','450px']
                    ,shade: 0.8
                    ,id: 'LAY_layuipro_detail'
                    ,btn: []
                    ,btnAlign: 'c'
                    ,moveType: 1
                    ,content: '/supplier/toEdit/' + obj.data.supplierId
                });
            } else if(obj.event == 'edit') {
                layer.open({
                    type: 2
                    ,title: '修改供应商'
                    ,area: ['500px','450px']
                    ,shade: 0.8
                    ,id: 'LAY_layuipro'
                    ,btn: []
                    ,btnAlign: 'c'
                    ,moveType: 1
                    ,content: '/supplier/toEdit/' + obj.data.supplierId
                });
            } else if(obj.event == 'del') {
                layer.confirm('确认要删除吗？', {
                    btn : [ '确定', '取消' ]
                }, function(index) {
                    $.ajax({
                        type: 'post',
                        url: '/supplier/delete/' + obj.data.supplierId,
                        success: function(data){
                            if(data.code == '0'){
                                tableRender(layui.table, { supplierName: $("#search_supplierName").val() });
                                layer.msg('删除成功', { time: 1000 });
                            }else {
                                layer.msg('删除失败', { time: 1000 });
                            }
                        }
                    });
                });
            }
        });

        $("#search-submit").on("click", function (){
            tableRender(table, { supplierName: $("#search_supplierName").val() });
            return false;
        });

        $("#refresh-btn").on("click", function (){
            $("#search_supplierName").val('');
            tableRender(table, { supplierName: '' });
        });
    });

    function tableRender(table, param_search) {
        table.render({
            elem: '#LAY-app-content-list'
            ,url: '/supplier/getPage'
            ,where: param_search
            ,page: true
            ,limits: [5,10,20,50]
            ,limit: 10
            ,layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip']
            ,method: 'get'
            ,request: {pageName: 'page', limitName: 'limit'}
            ,toolbar: '#toolbarDemo'
            ,cellMinWidth: 80
            ,defaultToolbar: ['filter', 'exports', 'print']
            ,title: '供应商信息表'
            ,cols: [ [
                {type:'checkbox'}
                ,{field:'supplierId', title:'供应商ID', width:100, sort:true}
                ,{field:'supplierName', title:'供应商名称', width:180}
                ,{field:'contact', title:'联系人', width:100}
                ,{field:'phone', title:'联系电话', width:140}
                ,{field:'address', title:'地址', width:250}
                ,{field:'createTime', title:'创建时间', width:170}
                ,{fixed: 'right', title:'操作', toolbar: '#table-content-list', width:240}
            ] ]
        });
    }
</script>
</body>
</html>
