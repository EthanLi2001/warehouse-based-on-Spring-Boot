<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的收藏</title>
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
    <style>
        .layui-table-cell {
            height: auto; /* 调整为auto以便内容可以撑开 */
            padding: 5px 10px; /* 减小一些内边距 */
            line-height: normal; /* 确保行高正常 */
            overflow: visible; /* 允许内容溢出，配合外层div的overflow hidden */
            white-space: normal; /* 允许换行 */
        }
        .product-info-box {
            display: flex;
            align-items: center;
        }
        .product-image {
            width: 80px; /* 固定图片宽度 */
            height: 80px; /* 固定图片高度 */
            object-fit: cover; /* 保持图片比例并填充 */
            margin-right: 10px;
            border: 1px solid #eee;
        }
        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .product-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }
        .product-price {
            font-size: 14px;
            color: red;
        }
        .favorite-time {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">我的收藏列表</div>
        <div class="layui-card-body">
            <table id="favorite-table" lay-filter="favorite-table"></table>
        </div>
    </div>
</div>

<!-- 表格操作列 -->
<script type="text/html" id="favorite-table-bar">
    <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="view_product">查看商品</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="remove">取消收藏</a>
</script>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:src="@{/js/jquery-3.5.1.min.js}"></script>
<script type="text/javascript" th:inline="javascript">
layui.use(['table', 'layer', 'jquery'], function () {
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.jquery;

    // Base URLs generated by Thymeleaf
    var favoriteGetPageUrl = /*[[@{/favorite/getPage}]]*/ '/favorite/getPage';
    var productToDetailBaseUrl = /*[[@{/product/toDetail}]]*/ '/product/toDetail'; // No trailing slash
    var favoriteRemoveByIdUrl = /*[[@{/favorite/removeById}]]*/ '/favorite/removeById';
    var baseImgUrlPrefix = /*[[@{/img}]]*/ '/img'; // No trailing slash
    var defaultImgUrl = /*[[@{/img/default.png}]]*/ '/img/default.png';

    table.render({
        elem: '#favorite-table',
        url: favoriteGetPageUrl, 
        page: true,
        limit: 10,
        limits: [10, 20, 30, 50],
        height: 'full-110', 
        cols: [[
            {type: 'numbers', title: '序号', width: 60},
            {
                field: 'pname', title: '商品信息', minWidth: 350, templet: function (d) {
                    let pfileValue = d.pfile ? d.pfile : 'default.png';
                    let imageUrl;
                    if (pfileValue === 'default.png') {
                        imageUrl = defaultImgUrl;
                    } else if (pfileValue.startsWith("http") || pfileValue.startsWith("/")) {
                        imageUrl = pfileValue; // Assume it's already a full or context-relative path
                    } else {
                        imageUrl = baseImgUrlPrefix + "/" + pfileValue;
                    }
                    
                    var favTime = d.favoriteTime ? new Date(d.favoriteTime.toString().replace("T", " ")).toLocaleString() : '未知时间';
                    return `<div class="product-info-box">
                               <img src="${imageUrl}" alt="${d.pname ? d.pname : '商品图片'}" class="product-image" onerror="this.src='${defaultImgUrl}'; this.onerror=null;">
                               <div class="product-details">
                                   <div class="product-name">${d.pname ? d.pname : '商品名称加载失败'}</div>
                                   <div class="product-price">价格: ¥ ${d.price ? d.price : '-'}</div>
                                   <div class="favorite-time">收藏于: ${favTime}</div>
                                   <div class="favorite-time" style="font-size:10px; color: #ccc;">商品ID: ${d.pid} | 收藏ID: ${d.favoriteId}</div>
                               </div>
                           </div>`;
                }
            },
            {title: '操作', width: 180, align: 'center', fixed: 'right', toolbar: '#favorite-table-bar'}
        ]]
    });

    // 监听行工具事件
    table.on('tool(favorite-table)', function (obj) {
        var data = obj.data; 
        var layEvent = obj.event; 

        if (layEvent === 'remove') { 
            layer.confirm('真的要取消收藏这个商品吗？', function (index) {
                $.post(favoriteRemoveByIdUrl, {favoriteId: data.favoriteId}, function (res) {
                    if (res.code == '0') {
                        layer.msg('取消收藏成功', {icon: 1});
                        table.reload('favorite-table'); 
                    } else {
                        layer.msg(res.msg || '取消收藏失败', {icon: 2});
                    }
                });
                layer.close(index);
            });
        } else if (layEvent === 'view_product') { 
            layer.open({
                type: 2,
                title: '商品详情',
                content: productToDetailBaseUrl + '/' + data.pid, 
                area: ['700px', '600px'],
                maxmin: true
            });
        }
    });
});
</script>
</body>
</html>
