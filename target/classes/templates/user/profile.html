<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>个人中心</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">个人信息</div>
        <div class="layui-card-body" style="padding: 15px;">
            <form class="layui-form" lay-filter="userProfileForm" style="max-width: 600px; margin: 0 auto;">
                <input type="hidden" name="uid">
                
                <div class="layui-form-item">
                    <label class="layui-form-label">用户账号</label>
                    <div class="layui-input-block">
                        <input type="text" name="name" required lay-verify="required" placeholder="请输入用户账号" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">新密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" placeholder="留空则不修改密码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label">确认新密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="confirmPassword" placeholder="请再次输入新密码" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">手机号码</label>
                    <div class="layui-input-block">
                        <input type="text" name="telephone" lay-verify="phone" placeholder="请输入手机号码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <label class="layui-form-label">注册时间</label>
                    <div class="layui-input-block">
                        <input type="text" name="createTime" readonly class="layui-input layui-disabled" style="border:none; background:none;">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="saveUserProfile">确认修改</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script>
layui.use(['form', 'layer', 'jquery', 'util'], function(){
    var form = layui.form,
        layer = layui.layer,
        $ = layui.jquery,
        util = layui.util;

    // 加载当前用户信息
    $.ajax({
        url: '/user/profile/info',
        type: 'GET',
        dataType: 'json',
        success: function(res){
            if(res.code === 0 && res.user){
                // 回显数据到表单
                var userData = res.user;
                if(userData.createTime){
                    userData.createTime = util.toDateString(userData.createTime, 'yyyy-MM-dd HH:mm:ss');
                }
                form.val('userProfileForm', userData);
            } else {
                layer.msg(res.msg || '获取用户信息失败', {icon: 5});
            }
        },
        error: function(){
            layer.alert('请求用户信息接口失败，请检查网络或联系管理员。', {icon: 2});
        }
    });

    // 表单提交事件
    form.on('submit(saveUserProfile)', function(data){
        var field = data.field; // 获取表单字段值

        // 密码校验
        if (field.password && field.password !== field.confirmPassword) {
            layer.msg('两次输入的新密码不一致！', {icon: 5});
            return false;
        }
        
        // 如果密码为空，则不提交密码字段，以告知后端不修改密码
        if (!field.password || field.password.trim() === '') {
            delete field.password;
            delete field.confirmPassword;
        }
        
        // 发起AJAX请求更新用户信息
        $.ajax({
            url: '/user/profile/update',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(field),
            dataType: 'json',
            success: function(res){
                if(res.code === 0){
                    layer.msg(res.msg || '用户信息更新成功！', {icon: 1, time: 1500}, function(){
                        // 可以选择刷新当前页面或提示用户
                        // window.location.reload(); 
                    });
                } else {
                    layer.alert(res.msg || '更新失败', {icon: 2});
                }
            },
            error: function(){
                layer.alert('请求更新接口失败，请检查网络或联系管理员。', {icon: 2});
            }
        });
        return false; // 阻止表单跳转
    });

});
</script>
</body>
</html>
