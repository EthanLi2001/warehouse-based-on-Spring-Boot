<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>收货地址管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
    <style>
        .address-card {
            border: 1px solid #e6e6e6;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .address-card.default {
            border-left: 3px solid #009688;
        }
        .address-card .actions {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .address-card p {
            margin-bottom: 5px;
            color: #333;
        }
        .address-card .consignee-phone {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .address-card .default-tag {
            color: #009688;
            font-weight: bold;
            margin-left: 10px;
        }
        .search-bar {
            padding: 10px 0;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">
            <span>我的收货地址</span>
            <button class="layui-btn layui-btn-sm layui-btn-normal" id="addAddressBtn" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i>新增收货地址
            </button>
        </div>
        <div class="layui-card-body">
            <div class="search-bar">
                <form class="layui-form" lay-filter="addressSearchForm">
                    <div class="layui-inline">
                        <input type="text" name="keyword" placeholder="输入收货人、电话或地址关键词搜索" autocomplete="off" class="layui-input" style="width: 300px;">
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-primary" id="searchAddressBtn" type="button">
                            <i class="layui-icon layui-icon-search"></i> 搜索
                        </button>
                        <button class="layui-btn layui-btn-primary" id="resetSearchBtn" type="button">重置</button>
                    </div>
                </form>
            </div>

            <div id="addressListContainer" class="layui-row layui-col-space15">
                <!-- 地址卡片将通过JS动态渲染到这里 -->
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑地址的弹窗 -->
<div id="addressFormPopup" style="display:none; padding: 20px;">
    <form class="layui-form" lay-filter="addressForm" id="addressForm">
        <input type="hidden" name="addressId">
        <input type="hidden" name="uid">

        <div class="layui-form-item">
            <label class="layui-form-label">收 货 人</label>
            <div class="layui-input-block">
                <input type="text" name="consigneeName" required lay-verify="required" placeholder="请输入收货人姓名" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">手机号码</label>
            <div class="layui-input-block">
                <input type="text" name="phoneNumber" required lay-verify="required|phone" placeholder="请输入手机号码" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">所在地区</label>
            <div class="layui-input-inline" style="width: 150px;">
                <input type="text" name="province" placeholder="省份" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-mid layui-word-aux">-</div>
            <div class="layui-input-inline" style="width: 150px;">
                <input type="text" name="city" placeholder="城市" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-mid layui-word-aux">-</div>
            <div class="layui-input-inline" style="width: 150px;">
                <input type="text" name="district" placeholder="区/县" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">详细地址</label>
            <div class="layui-input-block">
                <textarea name="detailedAddress" required lay-verify="required" placeholder="请输入详细地址，如街道、楼牌号等" class="layui-textarea"></textarea>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">设为默认</label>
            <div class="layui-input-block">
                <input type="checkbox" name="isDefault" lay-skin="switch" lay-text="是|否">
            </div>
        </div>

        <div class="layui-form-item" style="text-align: center;">
            <button class="layui-btn" lay-submit lay-filter="submitAddress">立即提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </form>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script>
    layui.config({
        base: '[[@{/layuiadmin/}]]' //静态资源所在路径
    }).extend({
        index: 'lib/index' //主入口模块
    }).use(['jquery', 'layer', 'form', 'element'], function(){
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var element = layui.element;

        // 加载地址列表
        function loadAddresses(keyword) {
            $.ajax({
                url: '[[@{/address/list}]]',
                type: 'GET',
                dataType: 'json',
                data: { keyword: keyword }, // 传递关键词
                success: function(res) {
                    if (res.code == '0' || res.code == 0) {
                        renderAddresses(res.data);
                    } else {
                        layer.msg(res.msg || '加载地址列表失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('请求地址列表失败，请检查网络', {icon: 2});
                }
            });
        }

        // 渲染地址卡片
        function renderAddresses(addresses) {
            var container = $('#addressListContainer');
            container.empty();
            if (!addresses || addresses.length === 0) {
                var searchKeyword = $('input[name="keyword"]').val();
                if (searchKeyword && searchKeyword.trim() !== "") {
                     container.html('<div class="layui-col-md12"><p style="text-align:center; padding:20px; color:#999;">未找到与 \"' + escapeHtml(searchKeyword) + '\" 相关的地址。</p></div>');
                } else {
                    container.html('<div class="layui-col-md12"><p style="text-align:center; padding:20px; color:#999;">您还没有添加收货地址哦~</p></div>');
                }
                return;
            }

            addresses.forEach(function(addr) {
                var defaultTag = addr.isDefault == 1 ? '<span class="default-tag">[默认地址]</span>' : '';
                var addressHtml = 
                    '<div class="layui-col-md6 layui-col-lg4">' +
                        '<div class="address-card ' + (addr.isDefault == 1 ? 'default' : '') + '">' +
                            '<div class="actions">' +
                                '<button class="layui-btn layui-btn-xs layui-btn-primary edit-btn" data-id="' + addr.addressId + '">编辑</button>' +
                                '<button class="layui-btn layui-btn-xs layui-btn-danger delete-btn" data-id="' + addr.addressId + '">删除</button>' +
                                (addr.isDefault != 1 ? '<button class="layui-btn layui-btn-xs set-default-btn" data-id="' + addr.addressId + '">设为默认</button>' : '') +
                            '</div>' +
                            '<p class="consignee-phone">' + escapeHtml(addr.consigneeName) + ' ' + escapeHtml(addr.phoneNumber) + defaultTag + '</p>' +
                            '<p>所在地区：' + escapeHtml(addr.province || '') + ' ' + escapeHtml(addr.city || '') + ' ' + escapeHtml(addr.district || '') + '</p>' +
                            '<p>详细地址：' + escapeHtml(addr.detailedAddress) + '</p>' +
                        '</div>' +
                    '</div>';
                container.append(addressHtml);
            });
        }
        
        function escapeHtml(unsafe) {
            if (unsafe === null || typeof unsafe === "undefined") return "";
            return String(unsafe)
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // 打开新增/编辑弹窗
        function openAddressPopup(addressId) {
            var title = addressId ? '编辑收货地址' : '新增收货地址';
            $('#addressForm')[0].reset(); // 重置表单
            form.val('addressForm', {isDefault: 0}); // 确保开关在重置时恢复到0
            
            if (addressId) {
                // 编辑模式，加载地址信息
                $.ajax({
                    url: '[[@{/address/get/}]]' + addressId,
                    type: 'GET',
                    success: function(res) {
                        if (res.code == '0' || res.code == 0) {
                            form.val('addressForm', res.address);
                        } else {
                            layer.msg(res.msg || '获取地址信息失败', {icon: 2});
                            return;
                        }
                    },
                    error: function(){
                        layer.msg('请求地址信息失败', {icon:2});
                        return;
                    }
                });
            }

            layer.open({
                type: 1,
                title: title,
                area: ['700px', 'auto'], // 宽度，高度自适应
                content: $('#addressFormPopup'),
                success: function(layero, index){
                    // layui.form.render(); // 重新渲染表单元素，尤其是 switch
                }
            });
        }

        // 事件绑定
        $('#addAddressBtn').on('click', function() {
            openAddressPopup(null);
        });

        // 搜索按钮点击
        $('#searchAddressBtn').on('click', function() {
            var keyword = $('input[name="keyword"]').val();
            loadAddresses(keyword);
        });
        
        // 输入框回车事件
        $('input[name="keyword"]').on('keypress', function(e){
            if(e.which == 13) { // Enter key pressed
                $('#searchAddressBtn').click();
                return false;
            }
        });

        // 重置搜索按钮点击
        $('#resetSearchBtn').on('click', function(){
            $('input[name="keyword"]').val('');
            loadAddresses(null); // 加载所有地址
        });

        $('#addressListContainer').on('click', '.edit-btn', function() {
            var addressId = $(this).data('id');
            openAddressPopup(addressId);
        });

        $('#addressListContainer').on('click', '.delete-btn', function() {
            var addressId = $(this).data('id');
            layer.confirm('确定要删除这个地址吗？', {icon: 3, title:'提示'}, function(index){
                $.ajax({
                    url: '[[@{/address/delete/}]]' + addressId,
                    type: 'POST',
                    success: function(res) {
                        if (res.code == '0' || res.code == 0) {
                            layer.msg('删除成功', {icon: 1});
                            loadAddresses($('input[name="keyword"]').val()); // 刷新时带上当前关键词
                        } else {
                            layer.msg(res.msg || '删除失败', {icon: 2});
                        }
                    },
                    error: function() {
                        layer.msg('请求删除失败', {icon: 2});
                    }
                });
                layer.close(index);
            });
        });

        $('#addressListContainer').on('click', '.set-default-btn', function() {
            var addressId = $(this).data('id');
            $.ajax({
                url: '[[@{/address/setDefault/}]]' + addressId,
                type: 'POST',
                success: function(res) {
                    if (res.code == '0' || res.code == 0) {
                        layer.msg('设为默认成功', {icon: 1});
                        loadAddresses($('input[name="keyword"]').val()); // 刷新时带上当前关键词
                    } else {
                        layer.msg(res.msg || '设置失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('请求设置默认地址失败', {icon: 2});
                }
            });
        });

        // 表单提交
        form.on('submit(submitAddress)', function(data){
            var formData = data.field;
            formData.isDefault = formData.isDefault === 'on' ? 1 : 0;
            var url = formData.addressId ? '[[@{/address/update}]]' : '[[@{/address/add}]]';
            var type = 'POST';

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json;charset=UTF-8',
                data: JSON.stringify(formData),
                success: function(res) {
                    if (res.code == '0' || res.code == 0) {
                        layer.msg(formData.addressId ? '更新成功' : '添加成功', {icon: 1});
                        layer.closeAll('page'); // 关闭弹窗
                        loadAddresses($('input[name="keyword"]').val()); // 刷新时带上当前关键词
                    } else {
                        layer.msg(res.msg || (formData.addressId ? '更新失败' : '添加失败'), {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('操作失败，请检查网络连接', {icon: 2});
                }
            });
            return false; // 阻止表单跳转
        });

        // 初始加载
        loadAddresses(null); // 首次加载时不带关键词
    });
</script>
</body>
</html>
