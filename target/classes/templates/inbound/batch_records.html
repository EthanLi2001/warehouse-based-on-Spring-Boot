<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>入库批次记录</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
  <style>
    .batch-card { margin-bottom: 15px; }
    .batch-card .layui-card-header { background-color: #f6f6f6; font-weight: bold; }
    .batch-summary { color: #666; font-size: 13px; }
  </style>
</head>

<body>
<div class="layui-fluid" style="padding:15px;">
  <div id="batchContainer"></div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({ base: '/layuiadmin/' }).extend({ index: 'lib/index' })
    .use(['index', 'layer', 'element'], function(){
    var layer = layui.layer, element = layui.element, $ = layui.jquery;

    $.get('/inbound/batchRecords', function(res) {
      if (res.code === 0 && res.data) {
        var html = '';
        var batchIndex = 0;
        Object.keys(res.data).forEach(function(batchNo) {
          var items = res.data[batchNo];
          var totalQty = items.reduce(function(sum, item) { return sum + (item.quantity || 0); }, 0);
          var productCount = items.length;
          
          html += '<div class="layui-card batch-card">';
          html += '  <div class="layui-card-header">';
          html += '    <span style="font-size:16px; color:#1E9FFF;">批次号: <b>' + batchNo + '</b></span>';
          html += '    <span class="batch-summary" style="margin-left:30px;">商品种类: ' + productCount + ' 种</span>';
          html += '    <span class="batch-summary" style="margin-left:10px;">入库总量: ' + totalQty + ' 件</span>';
          html += '  </div>';
          html += '  <div class="layui-card-body" style="padding:10px;">';
          html += '    <table class="layui-table" lay-skin="line">';
          html += '      <thead><tr>';
          html += '        <th>入库单号</th><th>商品名称</th><th>供应商</th><th>入库数量</th><th>入库时间</th>';
          html += '      </tr></thead><tbody>';
          
          items.forEach(function(item) {
            html += '<tr>';
            html += '  <td>' + (item.orderNo || '-') + '</td>';
            html += '  <td>' + (item.productName || '-') + '</td>';
            html += '  <td>' + (item.supplierName || '-') + '</td>';
            html += '  <td>' + (item.quantity || 0) + '</td>';
            html += '  <td>' + (item.createTime ? new Date(item.createTime).toLocaleString('zh-CN') : '-') + '</td>';
            html += '</tr>';
          });
          
          html += '      </tbody></table>';
          html += '  </div>';
          html += '</div>';
        });
        
        if (!html) {
          html = '<blockquote class="layui-elem-quote">暂无已审核的入库批次记录</blockquote>';
        }
        
        $('#batchContainer').html(html);
      } else {
        $('#batchContainer').html('<blockquote class="layui-elem-quote layui-elem-quote-red">加载批次数据失败</blockquote>');
      }
    });
  });
</script>
</body>
</html>
