<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>修改订单信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>
<body>

<div class="layui-form" lay-filter="layuiadmin-app-form-list" id="layuiadmin-app-form-list"
     style="padding: 20px 30px 0 0;">

    <!-- 客户名称 下拉框 -->
    <div class="layui-form-item">
        <label class="layui-form-label">客户名称</label>
        <div class="layui-input-inline">
            <select name="customerId" lay-verify="required">
                <option value="">请选择客户</option>
                <th:block th:each="customer : ${customers}">
                    <option th:value="${customer.customerId}" th:text="${customer.customerName}"
                            th:selected="${customer.customerId == editOrder.customerId ? 'selected' : ''}"></option>
                </th:block>
            </select>
        </div>
    </div>

    <!-- 订单状态 -->
    <div class="layui-form-item">
        <label class="layui-form-label">订单状态</label>
        <div class="layui-input-inline">
            <select name="status" lay-verify="required">
                <option value="0" th:selected="${editOrder.status == 0}">待付款</option>
                <option value="1" th:selected="${editOrder.status == 1}">待制作</option>
                <option value="2" th:selected="${editOrder.status == 2}">待配送</option>
                <option value="3" th:selected="${editOrder.status == 3}">已完成</option>
                <option value="4" th:selected="${editOrder.status == 4}">已取消</option>
            </select>
        </div>
    </div>

    <!-- 订单总价 -->
    <div class="layui-form-item">
        <label class="layui-form-label">订单总价</label>
        <div class="layui-input-inline">
            <input type="number" name="totalPrice" lay-verify="required|number" placeholder="请输入订单总价" autocomplete="off"
                   class="layui-input" th:value="${editOrder.totalPrice}" readonly>
        </div>
    </div>

    <!-- 下单时间 -->
    <div class="layui-form-item">
        <label class="layui-form-label">下单时间</label>
        <div class="layui-input-inline">
            <input type="text" name="orderTime" lay-verify="required" placeholder="请选择下单时间" autocomplete="off"
                   class="layui-input" th:value="${#dates.format(editOrder.orderTime, 'yyyy-MM-dd''T''HH:mm')}" readonly>
        </div>
    </div>

    <!-- 配送时间 -->
    <div class="layui-form-item">
        <label class="layui-form-label">配送时间</label>
        <div class="layui-input-inline">
            <input type="datetime-local" name="deliveryTime" lay-verify="required" placeholder="请选择配送时间" autocomplete="off"
                   class="layui-input" th:value="${#dates.format(editOrder.deliveryTime, 'yyyy-MM-dd''T''HH:mm')}">
        </div>
    </div>


    <!-- 隐藏域，用于存储订单的 ID -->
    <div class="layui-form-item">
        <div class="layui-input-inline">
            <input type="hidden" name="oid" th:value="${editOrder.oid}" />
            <input type="hidden" name="customerId" th:value="${editOrder.customerId}" />
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
        <div class="layui-input-inline">
            <button class="layui-btn layuiadmin-btn-list layui-btn-normal" lay-submit
                    lay-filter="layuiadmin-app-form-submit" id="layuiadmin-app-add-submit">修改</button>
            <button class="layui-btn layuiadmin-btn-list layui-btn-primary"
                    lay-filter="" id="layuiadmin-app-add-cancel">取消</button>
        </div>
    </div>
</div>

</body>
<script src="/static/layuiadmin/layui/layui.js" th:src="@{/layuiadmin/layui/layui.js}"></script>
<script src="/static/js/jquery-3.5.1.min.js" th:src="@{/js/jquery-3.5.1.min.js}"></script>
<script>
    layui.config({
        base: '/layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index' //主入口模块
    }).use(['index', 'form'], function () {
        var $ = layui.$
            , layer = parent.layer === undefined ? layui.layer : parent.layer
            , form = layui.form


        //监听提交
        form.on('submit(layuiadmin-app-form-submit)', function (data) {
            var field = data.field; //获取提交的字段
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            console.log(field);
            var parent$ = window.parent.layui.jquery;

            //提交 Ajax 成功后，关闭当前弹层并重载表格
            $.ajax({
                type: 'post',
                url: '/orders/doEdit', // ajax请求路径
                data: field,
                success: function (data) {
                    if (data.code == '0') {
                        let param_search = {
                            oid: parent$("#search_oid").val(),
                        };
                        parent.tableRender(parent.layui.table, param_search);
                        layer.msg('修改成功', {
                            time: 1000,
                            end: function () {
                                parent.layer.close(index); //再执行关闭
                            }
                        });
                    } else {
                        layer.msg('修改失败', {
                            time: 1000,
                            end: function () {
                                parent.layer.close(index); //再执行关闭
                            }
                        });
                    }
                }
            });
        });

        //取消按钮事件
        $('#layuiadmin-app-add-cancel').on('click', function() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        });
    });
</script>
</html>
