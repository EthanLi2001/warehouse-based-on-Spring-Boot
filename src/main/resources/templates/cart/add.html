<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>新增购物车项</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css"
          media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css"
          media="all">
</head>
<body>

<div class="layui-form" lay-filter="layuiadmin-app-form" id="layuiadmin-app-form" style="padding: 20px 30px 0 0;">
    <!-- 用户名称: Conditional display -->
    <div class="layui-form-item" th:if="${currentUserRole == 'admin'}">
        <label class="layui-form-label">用户名称</label>
        <div class="layui-input-inline">
            <select name="uid" lay-verify="required"> <!-- Required only if admin -->
                <option value="">请选择用户</option>
                <th:block th:if="${users != null}" th:each="user : ${users}">
                    <option th:value="${user.uid}" th:text="${user.name}"></option>
                </th:block>
            </select>
        </div>
    </div>
    <!-- If user is not admin, uid will be set by backend based on session. -->
    <!-- We can also pass it as a hidden field if needed, but backend override is safer. -->
    <!-- <input type="hidden" name="uid" th:if="${currentUserRole == 'user' && currentUser != null}" th:value="${currentUser.uid}" /> -->

    <!-- 商品ID 下拉框 -->
    <div class="layui-form-item">
        <label class="layui-form-label">商品名称</label>
        <div class="layui-input-inline">
            <select name="pid" lay-verify="required">
                <option value="">请选择商品</option>
                <th:block th:each="product : ${products}">
                    <option th:value="${product.pid}" th:text="${product.pname}"></option>
                </th:block>
            </select>
        </div>
    </div>

    <!-- 购买数量 -->
    <div class="layui-form-item">
        <label class="layui-form-label">购买数量</label>
        <div class="layui-input-inline">
            <input type="number" name="quantity" lay-verify="required|number" placeholder="请输入购买数量" autocomplete="off"
                   class="layui-input" value="1"> <!-- Default quantity to 1 -->
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
        <div class="layui-input-inline">
            <button class="layui-btn layuiadmin-btn-list layui-btn-normal" lay-submit
                    lay-filter="layuiadmin-app-form-submit" id="layuiadmin-app-add-submit">添加
            </button>
            <button type="button" class="layui-btn layuiadmin-btn-list layui-btn-primary"
                    id="layuiadmin-app-add-cancel">取消
            </button>
        </div>
    </div>
</div>

</body>
<script src="/static/layuiadmin/layui/layui.js" th:src="@{/layuiadmin/layui/layui.js}"></script>
<script src="/static/js/jquery-3.5.1.min.js" th:src="@{/js/jquery-3.5.1.min.js}"></script>
<script>
    layui.config({
        base: '/layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index' //主入口模块
    }).use(['index', 'form', 'laydate'], function () {
        var $ = layui.jquery
            , layer = parent.layer === undefined ? layui.layer : parent.layer
            , form = layui.form
            , laydate = layui.laydate;


        //监听提交
        form.on('submit(layuiadmin-app-form-submit)', function (data) {
            var field = data.field; //获取提交的字段
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            console.log(field);
            var parent$ = window.parent.layui.jquery;

            //提交 Ajax 成功后，关闭当前弹层并重载表格
            $.ajax({
                type: 'post',
                url: '/cart/doAdd', // 购物车新增请求路径
                data: field,
                success: function (data) {
                    console.log(data);
                    if (data.code == '0') {
                        var param_search = {
                            cid: parent$("#search_cid").val()
                        };
                        parent.tableRender(parent.layui.table, param_search);
                        layer.msg('添加成功', {
                            time: 1000,
                            end: function () {
                                parent.layer.close(index); //再执行关闭
                            }
                        });
                    } else {
                        layer.msg('添加失败', {
                            time: 1000,
                            end: function () {
                                parent.layer.close(index); //再执行关闭
                            }
                        });
                    }
                }
            });
        });

        $("#layuiadmin-app-add-cancel").on('click', function () {
            console.log("cancel click");
            parent.layer.close(parent.layer.getFrameIndex(window.name)); //再执行关闭
        });
    });
</script>
</html>
