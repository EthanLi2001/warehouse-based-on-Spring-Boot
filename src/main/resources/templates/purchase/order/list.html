<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>采购订单管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/layuiadmin/style/admin.css" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <div class="layui-tab layui-tab-brief">
                        <ul class="layui-tab-title">
                            <li class="layui-this" id="tab-all">全部</li>
                            <li id="tab-pending">待审核</li>
                            <li id="tab-approved">已审核</li>
                            <li id="tab-shipped">已发货</li>
                            <li id="tab-arrived">已到货</li>
                        </ul>
                    </div>
                </div>
                <div class="layui-card-body">
                    <table class="layui-hide" id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table>
                    <script type="text/html" id="orderBar">
                        <a class="layui-btn layui-btn-xs" lay-event="detail">详情</a>
                        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>
                    </script>
                    <script type="text/html" id="statusBar">
                        {{# if(d.status == 0){ }}
                        <button class="layui-btn layui-btn-xs layui-btn-normal" onclick="updateStatus({{d.poId}}, 1)">审核通过</button>
                        {{# } }}
                        {{# if(d.status == 1){ }}
                        <button class="layui-btn layui-btn-xs layui-btn-normal" onclick="updateStatus({{d.poId}}, 2)">确认发货</button>
                        {{# } }}
                        {{# if(d.status == 2){ }}
                        <button class="layui-btn layui-btn-xs layui-btn-normal" onclick="updateStatus({{d.poId}}, 3)">确认到货</button>
                        {{# } }}
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="none" src="/jquery-3.5.1.min.js"></script>
<script th:inline="none" src="/layuiadmin/layui/layui.js"></script>
<script th:inline="none">
    var currentStatus = '';
    var tableIns;

    layui.use(['table', 'layer'], function(){
        table = layui.table;
        layer = layui.layer;

        tableIns = table.render({
            elem: '#LAY-app-content-list',
            url: '/purchaseOrder/getPage',
            where: { status: currentStatus },
            cols: [[
                {field:'poId', title:'订单ID', width:80},
                {field:'poNo', title:'订单编号', width:150},
                {field:'productName', title:'商品名称', width:120},
                {field:'quantity', title:'采购数量', width:100},
                {field:'price', title:'单价', width:100},
                {field:'supplierName', title:'供应商', width:120},
                {field:'status', title:'状态', width:100, templet:function(d){
                    var color = '';
                    if(d.status == '待审核') color = 'orange';
                    else if(d.status == '已审核') color = 'blue';
                    else if(d.status == '已发货') color = 'green';
                    else if(d.status == '已到货') color = 'gray';
                    return '<span style="color:'+color+'">'+d.status+'</span>';
                }},
                {field:'createTime', title:'创建时间', width:160},
                {field:'status', title:'操作', width:180, toolbar:'#statusBar'},
                {fixed:'right', title:'管理', width:150, toolbar:'#orderBar'}
            ]],
            page: true,
            limit: 10,
            limits: [10, 20, 50, 100]
        });

        table.on('tool(LAY-app-content-list)', function(obj){
            var data = obj.data;
            if(obj.event === 'detail'){
                layer.open({
                    type: 2,
                    title: '订单详情',
                    shadeClose: true,
                    shade: 0.8,
                    area: ['700px', '600px'],
                    content: '/purchaseOrder/toDetail/'+data.poId
                });
            } else if(obj.event === 'delete'){
                layer.confirm('确定要删除该订单吗？', function(index){
                    $.post('/purchaseOrder/delete/'+data.poId, function(res){
                        if(res.code == '0' || res.code == 0){
                            layer.msg('删除成功', {icon: 1});
                            tableIns.reload();
                        } else {
                            layer.msg(res.msg || '删除失败', {icon: 2});
                        }
                    });
                    layer.close(index);
                });
            }
        });

        $('#tab-all').click(function(){
            currentStatus = '';
            tableIns.reload({where: {status: ''}});
        });
        $('#tab-pending').click(function(){
            currentStatus = '待审核';
            tableIns.reload({where: {status: '待审核'}});
        });
        $('#tab-approved').click(function(){
            currentStatus = '已审核';
            tableIns.reload({where: {status: '已审核'}});
        });
        $('#tab-shipped').click(function(){
            currentStatus = '已发货';
            tableIns.reload({where: {status: '已发货'}});
        });
        $('#tab-arrived').click(function(){
            currentStatus = '已到货';
            tableIns.reload({where: {status: '已到货'}});
        });
    });

    function updateStatus(poId, status){
        $.post('/purchaseOrder/updateStatus', {poId: poId, status: status}, function(res){
            if(res.code == '0' || res.code == 0){
                layer.msg('状态更新成功', {icon: 1});
                tableIns.reload();
            } else {
                layer.msg(res.msg || '状态更新失败', {icon: 2});
            }
        });
    }
</script>
</body>
</html>
