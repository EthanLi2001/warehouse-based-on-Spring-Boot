<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>采购计划管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/layuiadmin/style/admin.css" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                        <div class="layui-btn-group">
                            <button class="layui-btn layui-btn-normal" id="addPlanBtn">添加采购计划</button>
                        </div>
                        <span style="margin-left: 20px;">采购计划管理</span>
                    </div>
                <div class="layui-card-body">
                    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                        <div class="layui-form-item">
                            <label class="layui-form-label">计划名称</label>
                            <div class="layui-input-inline">
                                <input type="text" name="planName" id="planName" placeholder="请输入计划名称" class="layui-input">
                            </div>
                            <label class="layui-form-label">状态</label>
                            <div class="layui-input-inline">
                                <select name="status" id="status">
                                    <option value="">全部状态</option>
                                    <option value="0">待审核</option>
                                    <option value="1">已审核</option>
                                    <option value="2">已执行</option>
                                    <option value="3">已取消</option>
                                </select>
                            </div>
                            <button class="layui-btn" id="searchBtn">查询</button>
                            <button class="layui-btn layui-btn-primary" id="resetBtn">重置</button>
                        </div>
                    </div>
                    <table class="layui-hide" id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table>
                    <script type="text/html" id="planBar">
                        <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
                        <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="createOrder">生成订单</a>
                        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="none" src="/jquery-3.5.1.min.js"></script>
<script th:inline="none" src="/layuiadmin/layui/layui.js"></script>
<script th:inline="none">
    layui.use(['table', 'layer'], function(){
        var table = layui.table;
        var layer = layui.layer;
        
        var tableIns = table.render({
            elem: '#LAY-app-content-list',
            url: '/purchase/plan/getPage',
            cols: [[
                {type:'checkbox', fixed: 'left'},
                {field:'planId', title:'计划ID', width:80, sort:true},
                {field:'planNo', title:'计划编号', width:150},
                {field:'planName', title:'计划名称', width:120},
                {field:'productName', title:'商品名称', width:120},
                {field:'quantity', title:'采购数量', width:100},
                {field:'reason', title:'采购原因', width:150},
                {field:'supplierName', title:'供应商', width:120},
                {field:'status', title:'状态', width:100, templet:function(d){
                    var color = '';
                    if(d.status == 0) color = 'orange';
                    else if(d.status == 1) color = 'blue';
                    else if(d.status == 2) color = 'green';
                    else color = 'gray';
                    var statusText = d.status == 0 ? '待审核' : d.status == 1 ? '已审核' : d.status == 2 ? '已执行' : d.status == 3 ? '已取消' : d.status;
                    return '<span style="color:'+color+'">'+statusText+'</span>';
                }},
                {field:'createTime', title:'创建时间', width:160},
                {fixed:'right', title:'操作', width:200, toolbar:'#planBar'}
            ]],
            page: true,
            limit: 10,
            limits: [10, 20, 50, 100],
            done: function(res, curr, count) {
                if(res.code != 0) {
                    layer.msg(res.msg || '加载失败', {icon: 2});
                }
            }
        });

        table.on('tool(LAY-app-content-list)', function(obj){
            var data = obj.data;
            if(obj.event === 'edit'){
                layer.open({
                    type: 2,
                    title: '编辑采购计划',
                    shadeClose: true,
                    shade: 0.8,
                    area: ['700px', '600px'],
                    content: '/purchase/plan/toEdit/'+data.planId,
                    end: function(){
                        tableIns.reload();
                    }
                });
            } else if(obj.event === 'createOrder'){
                layer.confirm('确定要从该计划生成采购订单吗？', function(index){
                    $.post('/purchaseOrder/createFromPlan/'+data.planId, function(res){
                        if(res.code == '0' || res.code == 0){
                            layer.msg('订单生成成功', {icon: 1});
                            tableIns.reload();
                        } else {
                            layer.msg(res.msg || '订单生成失败', {icon: 2});
                        }
                    });
                    layer.close(index);
                });
            } else if(obj.event === 'delete'){
                layer.confirm('确定要删除该采购计划吗？', function(index){
                    $.post('/purchase/plan/delete/'+data.planId, function(res){
                        if(res.code == '0' || res.code == 0){
                            layer.msg('删除成功', {icon: 1});
                            tableIns.reload();
                        } else {
                            layer.msg(res.msg || '删除失败', {icon: 2});
                        }
                    });
                    layer.close(index);
                });
            }
        });

        $('#searchBtn').click(function(){
            tableIns.reload({
                where: {
                    planName: $('#planName').val(),
                    status: $('#status').val()
                },
                page: {
                    curr: 1
                }
            });
        });

        $('#resetBtn').click(function(){
            $('#planName').val('');
            $('#status').val('');
            tableIns.reload({
                where: {},
                page: {
                    curr: 1
                }
            });
        });

        $('#addPlanBtn').click(function(){
            layer.open({
                type: 2,
                title: '新建采购计划',
                shadeClose: true,
                shade: 0.8,
                area: ['700px', '600px'],
                content: '/purchase/plan/toAdd',
                end: function(){
                    tableIns.reload();
                }
            });
        });

        window.refreshTable = function(){
            tableIns.reload();
        };
    });
</script>
</body>
</html>
