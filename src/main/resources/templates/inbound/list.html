<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>入库管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto">
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">入库类型：</label>
          <div class="layui-input-inline">
            <select id="search_type">
              <option value="">全部</option>
              <option value="1">采购到货</option>
              <option value="2">退货入库</option>
            </select>
          </div>
        </div>
        <div class="layui-inline">
          <label class="layui-form-label">入库单号：</label>
          <div class="layui-input-inline">
            <input type="text" id="search_orderNo" placeholder="请输入入库单号" autocomplete="off" class="layui-input"/>
          </div>
        </div>
        <div class="layui-inline">
          <button id="search-submit" class="layui-btn layuiadmin-btn-list" lay-filter="LAY-app-contlist-search">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
          </button>
        </div>
      </div>
    </div>

    <div class="layui-card-body layui-form">
      <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide">
      </table>

      <script type="text/html" id="toolbarDemo">
        <div class="layui-btn-container">
          <button class="layui-btn layuiadmin-btn-list" lay-event="add">新增入库单</button>
          <button class="layui-btn layui-btn-normal layuiadmin-btn-list" lay-event="batchRecords"><i class="layui-icon layui-icon-list"></i>批次记录</button>
        </div>
      </script>

      <script type="text/html" id="table-content-list">
        <a class="layui-btn layui-btn-xs" lay-event="detail"><i class="layui-icon layui-icon-search"></i>详情</a>
        {{# if(d.status == 0){ }}
        <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="approve"><i class="layui-icon layui-icon-ok"></i>审核入库</a>
        {{# } }}
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
      </script>

      <script type="text/html" id="statusTpl">
        {{# if(d.status == 0){ }}
        <span class="layui-badge layui-bg-yellow">待审核</span>
        {{# } else if(d.status == 1){ }}
        <span class="layui-badge layui-bg-green">已入库</span>
        {{# } }}
      </script>

      <script type="text/html" id="typeTpl">
        {{# if(d.type == 1){ }}
        <span>采购到货</span>
        {{# } else if(d.type == 2){ }}
        <span>退货入库</span>
        {{# } }}
      </script>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'table', 'form'], function(){
    var table = layui.table
            ,form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    layer.ready(function (){
      tableRender(table, {});
    });

    table.on('toolbar(LAY-app-content-list)', function(obj){
      if(obj.event == 'add') {
        layer.open({
          type: 2
          ,title: '新增入库单'
          ,area: ['600px','500px']
          ,shade: 0.8
          ,id: 'LAY_layuipro'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inbound/toAdd'
        });
      } else if(obj.event == 'batchRecords') {
        layer.open({
          type: 2
          ,title: '入库批次记录'
          ,area: ['850px','600px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_batch'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inbound/toBatchRecords'
        });
      }
    });

    table.on('tool(LAY-app-content-list)', function(obj){
      if(obj.event == 'detail') {
        layer.open({
          type: 2
          ,title: '入库单详情'
          ,area: ['600px','450px']
          ,shade: 0.8
          ,id: 'LAY_layuipro_detail'
          ,btn: []
          ,btnAlign: 'c'
          ,moveType: 1
          ,content: '/inbound/toDetail/' + obj.data.inboundId
        });
      } else if(obj.event == 'approve') {
        layer.confirm('确认审核此入库单并更新库存吗？', {
          btn : [ '确定', '取消' ]
        }, function(index) {
          $.ajax({
            type: 'post',
            url: '/inbound/approve/' + obj.data.inboundId,
            success: function(data){
              if(data.code == '0'){
                tableRender(layui.table, {});
                layer.msg('审核成功，库存已更新', {time: 1500});
              }else {
                layer.msg('审核失败', {time: 1500});
              }
            }
          });
        });
      } else if(obj.event == 'del') {
        layer.confirm('确认要删除吗？', {
          btn : [ '确定', '取消' ]
        }, function(index) {
          $.ajax({
            type: 'post',
            url: '/inbound/delete/' + obj.data.inboundId,
            success: function(data){
              if(data.code == '0'){
                tableRender(layui.table, {});
                layer.msg('删除成功', {time: 1000});
              }else {
                layer.msg('删除失败', {time: 1000});
              }
            }
          });
        });
      }
    });

    $("#search-submit").on("click", function (){
      var param_search = {
        type: $("#search_type").val() || null,
        orderNo: $("#search_orderNo").val()
      };
      tableRender(layui.table, param_search);
      return false;
    });

    form.render();
  });

  function tableRender(table, param_search) {
    table.render({
      elem: '#LAY-app-content-list'
      ,url: '/inbound/list'
      ,where: param_search
      ,page: true
      ,limits: [5,10,20,50]
      ,limit: 10
      ,layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip']
      ,method: 'post'
      ,request: {pageName: 'page', limitName: 'limit'}
      ,toolbar: '#toolbarDemo'
      ,cellMinWidth: 80
      ,title: '入库单列表'
      ,cols: [ [
        {type:'checkbox'}
        ,{field:'inboundId', title:'ID', width:80}
        ,{field:'orderNo', title:'入库单号', width:150}
        ,{field:'type', title:'入库类型', width:100, templet: '#typeTpl'}
        ,{field:'productId', title:'商品ID', width:100}
        ,{field:'quantity', title:'数量', width:100}
        ,{field:'batchNo', title:'批次号', width:120}
        ,{field:'supplierId', title:'供应商ID', width:100}
        ,{field:'status', title:'状态', width:100, templet: '#statusTpl'}
        ,{field:'createTime', title:'创建时间', width:150}
        ,{fixed: 'right', title:'操作', toolbar: '#table-content-list', width:200}
      ] ]
    });
  }
</script>
</body>
</html>
