<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>客户信息管理</title>
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">
            <div class="layui-row">
                <div class="layui-col-md8">
                    <h2>客户信息管理</h2>
                </div>
                <div class="layui-col-md4 text-right">
                    <button class="layui-btn layui-btn-primary" onclick="openAddModal()">
                        <i class="layui-icon layui-icon-add-1"></i> 添加客户
                    </button>
                </div>
            </div>
        </div>
        
        <div class="layui-card-body">
            <div class="layui-form">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">客户名称：</label>
                        <div class="layui-input-inline">
                            <input type="text" id="searchCustomerName" placeholder="请输入客户名称" 
                                   class="layui-input">
                        </div>
                    </div>
                    <button id="searchBtn" class="layui-btn" lay-filter="search">
                        <i class="layui-icon layui-icon-search"></i> 查询
                    </button>
                    <button id="resetBtn" class="layui-btn layui-btn-primary">
                        <i class="layui-icon layui-icon-refresh"></i> 重置
                    </button>
                </div>
            </div>
            
            <table id="customerTable" lay-filter="customerTable"></table>
        </div>
    </div>
</div>

<script type="text/html" id="customerBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>
</script>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script th:src="@{/jquery-3.5.1.min.js}"></script>
<script th:inline="none">
layui.use(['table', 'layer', 'form'], function() {
    var table = layui.table;
    var layer = layui.layer;
    var form = layui.form;

    table.render({
        elem: '#customerTable',
        url: '/customer/getPage',
        method: 'post',
        page: true,
        limit: 10,
        limits: [5, 10, 20, 50],
        cols: [
            [
                {type: 'checkbox', fixed: 'left'},
                {field: 'customerId', title: '客户ID', width: 80, sort: true},
                {field: 'customerName', title: '客户名称', width: 180},
                {field: 'phoneNumber', title: '联系电话', width: 130},
                {field: 'contactPerson', title: '联系人', width: 100},
                {field: 'detailedAddress', title: '地址', minWidth: 200},
                {field: 'createTime', title: '创建时间', width: 170, templet: function(d) {
                    if (!d.createTime) return '';
                    var date = new Date(d.createTime);
                    var year = date.getFullYear();
                    var month = String(date.getMonth() + 1).padStart(2, '0');
                    var day = String(date.getDate()).padStart(2, '0');
                    var hours = String(date.getHours()).padStart(2, '0');
                    var minutes = String(date.getMinutes()).padStart(2, '0');
                    var seconds = String(date.getSeconds()).padStart(2, '0');
                    return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;
                }},
                {fixed: 'right', title: '操作', toolbar: '#customerBar', width: 120}
            ]
        ],
        done: function(res) {
        }
    });

    table.on('tool(customerTable)', function(obj) {
        var data = obj.data;
        if (obj.event === 'edit') {
            layer.open({
                type: 2,
                title: '编辑客户',
                content: '/customer/toEdit/' + data.customerId,
                area: ['600px', '550px'],
                end: function() {
                    table.reload('customerTable');
                }
            });
        } else if (obj.event === 'delete') {
            layer.confirm('确定删除该客户吗？', function(index) {
                $.post('/customer/delete/' + data.customerId, function(res) {
                    if (res.code == '0') {
                        layer.msg('删除成功', {icon: 1});
                        table.reload('customerTable');
                    } else {
                        layer.msg(res.msg || '删除失败', {icon: 2});
                    }
                });
                layer.close(index);
            });
        }
    });

    $('#searchBtn').on('click', function() {
        table.reload('customerTable', {
            where: {
                customerName: $('#searchCustomerName').val()
            }
        });
    });

    $('#resetBtn').on('click', function() {
        $('#searchCustomerName').val('');
        table.reload('customerTable', {
            where: {
                customerName: ''
            }
        });
    });
});

function openAddModal() {
    layer.open({
        type: 2,
        title: '添加客户',
        content: '/customer/toAdd',
        area: ['600px', '550px'],
        end: function() {
            layui.table.reload('customerTable');
        }
    });
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    var date = new Date(dateStr);
    return date.getFullYear() + '-' + 
           String(date.getMonth() + 1).padStart(2, '0') + '-' + 
           String(date.getDate()).padStart(2, '0') + ' ' + 
           String(date.getHours()).padStart(2, '0') + ':' + 
           String(date.getMinutes()).padStart(2, '0') + ':' + 
           String(date.getSeconds()).padStart(2, '0');
}
</script>
</body>
</html>
