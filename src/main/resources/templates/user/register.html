<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>注册 - 智能仓储管理系统</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/login.css}" media="all">
</head>
<body>

  <div class="layadmin-user-login layadmin-user-display-show" id="LAY-user-register">
    <div class="layadmin-user-login-main">
      <div class="layadmin-user-login-box layadmin-user-login-header">
        <h2>智能仓储管理系统</h2>
        <p>创建新账户</p>
      </div>
      <div class="layadmin-user-login-box layadmin-user-login-body layui-form">
        <div class="layui-form-item">
          <label class="layadmin-user-login-icon layui-icon layui-icon-username" for="LAY-user-register-username"></label>
          <input type="text" name="name" id="LAY-user-register-username" lay-verify="required" placeholder="用户名" class="layui-input">
        </div>
        <div class="layui-form-item">
          <label class="layadmin-user-login-icon layui-icon layui-icon-password" for="LAY-user-register-password"></label>
          <input type="password" name="password" id="LAY-user-register-password" lay-verify="required|password" placeholder="密码 (至少4位)" class="layui-input">
        </div>
        <div class="layui-form-item">
          <label class="layadmin-user-login-icon layui-icon layui-icon-password" for="LAY-user-register-confirm-password"></label>
          <input type="password" name="confirmPassword" id="LAY-user-register-confirm-password" lay-verify="required|confirmPassword" placeholder="确认密码" class="layui-input">
        </div>
        <div class="layui-form-item">
          <label class="layadmin-user-login-icon layui-icon layui-icon-cellphone" for="LAY-user-register-cellphone"></label>
          <input type="text" name="telephone" id="LAY-user-register-cellphone" lay-verify="required|phone" placeholder="手机号" class="layui-input">
        </div>
        
        <div class="layui-form-item">
          <label class="layui-form-label" style="width: auto; padding-left: 10px; padding-right:0px;">用户角色</label>
          <div class="layui-input-block" style="margin-left: 85px;"> <!-- 根据实际label宽度调整 margin-left -->
            <select name="roleId" lay-verify="required">
              <option value="">--请选择角色--</option>
              <!-- Iterate over roles passed from the controller -->
              <option th:each="role : ${roles}" th:value="${role.rid}" th:text="${role.roleName}"></option>
            </select>
          </div>
        </div>

        <div class="layui-form-item">
          <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="LAY-user-register-submit">注 册</button>
        </div>
        <div class="layui-trans layui-form-item layadmin-user-login-other">
          <a th:href="@{/user/toLogin}" class="layadmin-user-jump-change layadmin-link">使用已有帐号登录</a>
        </div>
      </div>
    </div>

    <div class="layui-trans layadmin-user-login-footer">
      <p>© 2018 <a href="http://www.layui.com/" target="_blank">layui.com</a></p>
      <p>
        <span><a href="http://www.layui.com/admin/#get" target="_blank">获取授权</a></span>
        <span><a href="http://www.layui.com/admin/pro/" target="_blank">在线演示</a></span>
        <span><a href="http://www.layui.com/admin/" target="_blank">前往官网</a></span>
      </p>
    </div>
  </div>

<script th:src="@{/layuiadmin/layui/layui.js}"></script>
<script>
layui.config({
  base: '[[@{/layuiadmin/}]]' //静态资源所在路径
}).extend({
  index: 'lib/index' //主入口模块
}).use(['index', 'form', 'layer'], function(){
  var $ = layui.$
  ,form = layui.form
  ,layer = layui.layer
  ,admin = layui.admin;

  form.render();

  //自定义验证规则
  form.verify({
    password: [
      /^[\S]{4,}$/
      ,'密码至少需要4位，且不能出现空格'
    ],
    confirmPassword: function(value){
      if(value !== $('#LAY-user-register-password').val()){
        return '两次密码输入不一致';
      }
    }
  });

  //提交
  form.on('submit(LAY-user-register-submit)', function(obj){
    var field = obj.field;
    
    // delete field.confirmPassword; // 确认密码字段不需要提交到后端

    admin.req({
      url: '[[@{/user/registerUser}]]', //实际注册的接口
      type: 'POST',
      data: field,
      done: function(res){
        if(res.code === 0){
          layer.msg('注册成功！', {
            offset: '15px',
            icon: 1,
            time: 2000
          }, function(){
            location.href = '[[@{/user/toLogin}]]'; //跳转到登录页
          });
        } else {
          layer.msg(res.msg || '注册失败，请重试', {icon: 5});
        }
      },
      error: function(xhr, status, error) {
          layer.msg('请求注册接口失败: ' + (xhr.responseJSON ? xhr.responseJSON.msg : error), {icon:5});
      }
    });
    return false; //阻止表单跳转
  });
});
</script>
</body>
</html>
