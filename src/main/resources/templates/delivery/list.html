<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>发货单列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">发货单号：</label>
                    <div class="layui-input-inline">
                        <input type="text" id="search_deliveryNo" placeholder="请输入发货单号" autocomplete="off" class="layui-input"/>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">状态：</label>
                    <div class="layui-input-inline">
                        <select id="search_status">
                            <option value="">全部</option>
                            <option value="0">待发货</option>
                            <option value="1">已发货</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <button id="search-submit" class="layui-btn layuiadmin-btn-list" lay-filter="LAY-app-contlist-search">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </button>
                </div>
            </div>
        </div>

        <div class="layui-card-body layui-form">
            <table id="LAY-app-content-list" lay-filter="LAY-app-content-list" class="layui-hide"></table>

            <script type="text/html" id="toolbarDemo">
                <div class="layui-btn-container">
                    <button class="layui-btn layuiadmin-btn-list" lay-event="add">添加发货单</button>
                </div>
            </script>

            <script type="text/html" id="table-content-list">
                <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="edit">编辑</a>
                <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
                {{#  if(d.status == 0){ }}
                <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="confirm">确认发货</a>
                {{#  } }}
            </script>
        </div>
    </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
    layui.config({
        base: '/layuiadmin/'
    }).extend({
        index: 'lib/index'
    }).use(['index', 'table', 'form'], function () {
        var table = layui.table, form = layui.form, layer = layui.layer, $ = layui.jquery;

        layer.ready(function () {
            tableRender(table, {});
        });

        table.on('toolbar(LAY-app-content-list)', function (obj) {
            if (obj.event == 'add') {
                layer.open({
                    type: 2,
                    title: '添加发货单',
                    area: ['600px', '500px'],
                    shade: 0.8,
                    id: 'LAY_layuipro',
                    btn: [],
                    btnAlign: 'c',
                    moveType: 1,
                    content: '/delivery/toAdd',
                    success: function (layero) {
                        console.log('完成新增');
                    }
                });
            }
        });

        table.on('tool(LAY-app-content-list)', function (obj) {
            if (obj.event == 'del') {
                layer.confirm('确认要删除吗？', {btn: ['确定', '取消']}, function (index) {
                    $.ajax({
                        type: 'post',
                        url: '/delivery/delete/' + obj.data.deliveryId,
                        success: function (data) {
                            if (data.code == '0') {
                                tableRender(layui.table, {});
                                layer.msg('删除成功', {time: 1000});
                            } else {
                                layer.msg('删除失败', {time: 1000});
                            }
                        }
                    });
                });
            } else if (obj.event == 'confirm') {
                layer.confirm('确认要发货吗？', {btn: ['确定', '取消']}, function (index) {
                    $.ajax({
                        type: 'post',
                        url: '/delivery/confirm/' + obj.data.deliveryId,
                        success: function (data) {
                            if (data.code == '0') {
                                tableRender(layui.table, {});
                                layer.msg(data.msg, {time: 1500});
                            } else {
                                layer.msg(data.msg, {time: 1500});
                            }
                        }
                    });
                });
            }
        });

        $("#search-submit").on("click", function () {
            tableRender(table, {
                orderNo: $("#search_deliveryNo").val(),
                status: $("#search_status").val()
            });
        });
    });

    function tableRender(table, param_search) {
        table.render({
            elem: '#LAY-app-content-list',
            url: '/delivery/list',
            where: param_search,
            page: true,
            limits: [5, 10, 20, 50],
            limit: 5,
            layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip'],
            method: 'post',
            request: {pageName: 'page', limitName: 'limit'},
            toolbar: '#toolbarDemo',
            cellMinWidth: 80,
            cols: [[
                {type: 'checkbox'},
                {field: 'deliveryId', title: 'ID', width: 60},
                {field: 'deliveryNo', title: '发货单号', width: 150},
                {field: 'orderNo', title: '关联订单', width: 100},
                {field: 'logisticsCompany', title: '物流公司', width: 120},
                {field: 'trackingNo', title: '运单号', width: 150},
                {field: 'operatorName', title: '操作人', width: 100},
                {field: 'status', title: '状态', width: 100,
                    templet: function(d) {
                        return d.status == 0 ? '待发货' : '已发货';
                    }
                },
                {field: 'createTime', title: '创建时间', width: 180,
                    templet: function(d) {
                        return layui.util.toDateString(d.createTime, 'yyyy-MM-dd HH:mm:ss');
                    }
                },
                {fixed: 'right', title: '操作', toolbar: '#table-content-list', width: 200}
            ]]
        });
    }
</script>
</body>
</html>
