<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>创建盘点任务</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">创建盘点任务</div>
    <div class="layui-card-body">
      <form class="layui-form" id="add-form">
        <div class="layui-form-item">
          <label class="layui-form-label">备注</label>
          <div class="layui-input-inline">
            <textarea name="remark" placeholder="请输入备注信息" class="layui-textarea"></textarea>
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formSubmit">创建</button>
            <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">取消</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  layui.config({
    base: '/layuiadmin/'
  }).extend({
    index: 'lib/index'
  }).use(['index', 'form', 'layer'], function(){
    var form = layui.form
            ,layer = layui.layer
            ,$ = layui.jquery;

    form.on('submit(formSubmit)', function(data){
      $.ajax({
        type: 'post',
        url: '/inventory/check/add',
        contentType: 'application/json',
        data: JSON.stringify(data.field),
        success: function(res){
          if(res.code == '0'){
            layer.msg('创建成功', {time: 1000}, function(){
              var index = parent.layer.getFrameIndex(window.name);
              parent.layer.close(index);
              parent.layui.table.reload('LAY-app-content-list');
            });
          } else {
            layer.msg(res.msg || '创建失败', {time: 1500});
          }
        },
        error: function(){
          layer.msg('系统异常', {time: 1500});
        }
      });
      return false;
    });

    form.render();
  });

  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
