<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>商品详情</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" th:href="@{/layuiadmin/layui/css/layui.css}" href="/static/layuiadmin/layui/css/layui.css" media="all">
  <link rel="stylesheet" th:href="@{/layuiadmin/style/admin.css}" href="/static/layuiadmin/style/admin.css" media="all">
</head>

<body>
<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-card-header">商品详情</div>
    <div class="layui-card-body">
      <div class="layui-form">
        <div class="layui-form-item">
          <label class="layui-form-label">商品编号</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${editProd.pid}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品名称</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${editProd.pname}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品单价</label>
          <div class="layui-input-inline">
            <input type="text" th:value="'¥' + ${editProd.price}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">库存下限</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${inventory.minStock}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">库存上限</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${inventory.maxStock}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">当前库存</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${inventory.quantity}" readonly class="layui-input layui-disabled" 
                   th:class="${inventory.warning == 'low' ? 'layui-bg-red' : (inventory.warning == 'high' ? 'layui-bg-orange' : '')}"/>
          </div>
          <span th:class="${inventory.warning == 'low' ? 'layui-badge layui-bg-red' : (inventory.warning == 'high' ? 'layui-badge layui-bg-orange' : 'layui-badge')}"
                th:text="${inventory.warning == 'low' ? '库存不足' : (inventory.warning == 'high' ? '库存积压' : '正常')}"></span>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">批次号</label>
          <div class="layui-input-inline">
            <input type="text" th:value="${inventory.batchNo != null ? inventory.batchNo : ''}" readonly class="layui-input layui-disabled"/>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品图片</label>
          <div class="layui-input-block">
            <img th:if="${editProd.pfile != null and editProd.pfile != ''}"
                 th:with="imageUrl=${#strings.startsWith(editProd.pfile, '/img/') ? editProd.pfile : '/img/' + editProd.pfile}"
                 th:src="${imageUrl}"
                 alt="商品图片" 
                 style="max-width: 200px; max-height: 200px; margin-top: 10px; border: 1px solid #eee; padding: 5px;"/>
            <span th:if="${editProd.pfile == null or editProd.pfile == ''}" class="layui-text-gray">暂无图片</span>
          </div>
        </div>

        <div class="layui-form-item">
          <label class="layui-form-label">商品描述</label>
          <div class="layui-input-block">
            <textarea readonly class="layui-textarea layui-disabled" th:text="${editProd.description}"></textarea>
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-block">
            <button class="layui-btn layui-btn-primary" onclick="closeLayer()">关闭</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/layuiadmin/layui/layui.js}" src="/static/layuiadmin/layui/layui.js"></script>
<script type="text/javascript">
  function closeLayer() {
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
</script>
</body>
</html>
